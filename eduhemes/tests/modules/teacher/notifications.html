<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildirishnomalar - EduHemis</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔔</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-fadeIn { animation: fadeIn 0.5s ease; }
        .animate-slideIn { animation: slideIn 0.3s ease; }
        .animate-pulse { animation: pulse 2s infinite; }
        
        .card-hover {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .notification-item {
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .notification-item.unread {
            background: #eff6ff;
            border-left-color: #3b82f6;
        }
        
        .notification-item:hover {
            background: #f9fafb;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-active {
            background: #3b82f6;
            color: white;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .reminder-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s;
        }
        
        .reminder-card.completed {
            opacity: 0.6;
            background: #f3f4f6;
        }
        
        .reminder-high {
            border-left: 4px solid #ef4444;
        }
        
        .reminder-medium {
            border-left: 4px solid #f59e0b;
        }
        
        .reminder-low {
            border-left: 4px solid #3b82f6;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-warning { background: #f59e0b; }
        .toast-info { background: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100">

<!-- ========== HEADER ========== -->
<div class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fas fa-bell"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl text-gray-800">EduHemis</h1>
                    <p class="text-xs text-gray-500">Bildirishnomalar</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="goToDashboard()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-all flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden md:inline">Bosh sahifa</span>
                </button>
                <div class="text-right hidden md:block">
                    <p class="font-bold text-gray-800">Said Alisherov</p>
                    <p class="text-xs text-gray-500">O'qituvchi • Veb dasturlash</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Said+Alisherov&background=4f46e5&color=fff" 
                     class="w-10 h-10 rounded-full border-2 border-purple-600 cursor-pointer" onclick="goToProfile()">
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page Title -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">🔔 Bildirishnomalar</h1>
        <div class="flex gap-3">
            <button onclick="markAllAsRead()" class="px-4 py-2 bg-blue-100 text-blue-600 rounded-xl hover:bg-blue-200 transition-all">
                <i class="fas fa-check-double mr-2"></i> Hammasini o'qildi
            </button>
            <button onclick="clearAllNotifications()" class="px-4 py-2 bg-red-100 text-red-600 rounded-xl hover:bg-red-200 transition-all">
                <i class="fas fa-trash-alt mr-2"></i> Tozalash
            </button>
        </div>
    </div>

    <!-- Statistics Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByType('all')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Jami</p>
                    <h3 class="text-2xl font-bold mt-1" id="totalCount">24</h3>
                </div>
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-bell"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByType('unread')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">O'qilmagan</p>
                    <h3 class="text-2xl font-bold mt-1 text-blue-600" id="unreadCount">8</h3>
                </div>
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByType('task')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Vazifalar</p>
                    <h3 class="text-2xl font-bold mt-1 text-orange-600" id="taskCount">6</h3>
                </div>
                <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-tasks"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByType('deadline')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Muddati o'tgan</p>
                    <h3 class="text-2xl font-bold mt-1 text-red-600" id="deadlineCount">3</h3>
                </div>
                <div class="w-12 h-12 bg-red-100 text-red-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
        <button onclick="filterByCategory('all')" id="tabAll" class="tab-btn tab-active">Barchasi</button>
        <button onclick="filterByCategory('task')" id="tabTask" class="tab-btn">📋 Vazifalar</button>
        <button onclick="filterByCategory('grade')" id="tabGrade" class="tab-btn">📊 Baholar</button>
        <button onclick="filterByCategory('attendance')" id="tabAttendance" class="tab-btn">✅ Davomat</button>
        <button onclick="filterByCategory('system')" id="tabSystem" class="tab-btn">⚙️ Tizim</button>
    </div>

    <!-- Search and Filter -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Bildirishnoma bo'yicha qidirish..." onkeyup="searchNotifications()">
            </div>
            <select id="priorityFilter" class="p-3 border rounded-xl bg-white" onchange="filterByPriority()">
                <option value="all">Barcha prioritetlar</option>
                <option value="high">Yuqori</option>
                <option value="medium">O'rtacha</option>
                <option value="low">Past</option>
            </select>
            <select id="dateFilter" class="p-3 border rounded-xl bg-white" onchange="filterByDate()">
                <option value="all">Barcha vaqtlar</option>
                <option value="today">Bugun</option>
                <option value="week">Bu hafta</option>
                <option value="month">Bu oy</option>
            </select>
        </div>
    </div>

    <!-- Notifications List -->
    <div id="notificationsList" class="space-y-3 mb-8">
        <!-- Notifications will be loaded here -->
    </div>

    <!-- Reminders Section -->
    <div class="bg-white rounded-3xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">⏰ Eslatmalar</h3>
            <button onclick="showAddReminderModal()" class="px-4 py-2 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-all">
                <i class="fas fa-plus mr-2"></i> Yangi eslatma
            </button>
        </div>
        
        <div id="remindersList" class="space-y-3">
            <!-- Reminders will be loaded here -->
        </div>
    </div>

</div>

<!-- Notification Detail Modal -->
<div id="notificationModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 max-w-lg w-full">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold" id="modalTitle">Bildirishnoma</h3>
            <button onclick="closeNotificationModal()" class="text-2xl text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<!-- Add Reminder Modal -->
<div id="reminderModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 max-w-md w-full">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold">➕ Yangi eslatma</h3>
            <button onclick="closeReminderModal()" class="text-2xl text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Sarlavha</label>
                <input type="text" id="reminderTitle" class="w-full p-3 border rounded-xl" placeholder="Eslatma sarlavhasi">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Tavsif</label>
                <textarea id="reminderDesc" rows="3" class="w-full p-3 border rounded-xl" placeholder="Eslatma tavsifi"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Sana va vaqt</label>
                <input type="datetime-local" id="reminderDateTime" class="w-full p-3 border rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Prioritet</label>
                <select id="reminderPriority" class="w-full p-3 border rounded-xl">
                    <option value="high">Yuqori</option>
                    <option value="medium" selected>O'rtacha</option>
                    <option value="low">Past</option>
                </select>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="addReminder()" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700">
                    <i class="fas fa-save mr-2"></i> Saqlash
                </button>
                <button onclick="closeReminderModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                    Bekor qilish
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast" class="toast"></div>

<script>
    // ========== MA'LUMOTLAR ==========
    let currentCategory = 'all';
    let currentPriority = 'all';
    let currentDateRange = 'all';
    let currentSearch = '';
    let currentTypeFilter = 'all';
    
    let notificationsData = [
        { id: 1, title: 'Yangi vazifa qo\'shildi', message: 'HTML portfolio vazifasi qo\'shildi. Muddat: 2025-03-25', type: 'task', category: 'task', priority: 'high', date: '2025-03-10T09:00:00', read: false, link: '../teacher/tasks.html' },
        { id: 2, title: 'Vazifa muddati yaqin', message: 'CSS animatsiyalar vazifasiga 3 kun qoldi', type: 'deadline', category: 'task', priority: 'high', date: '2025-03-12T10:30:00', read: false, link: '../teacher/tasks.html' },
        { id: 3, title: 'Baho qo\'yildi', message: 'Veb dasturlash fanidan Azimjon Karimov 5 ball oldi', type: 'grade', category: 'grade', priority: 'medium', date: '2025-03-13T14:15:00', read: true, link: '../teacher/grades.html' },
        { id: 4, title: 'Davomat olingan', message: 'AT-101-20 guruhi davomati olingan', type: 'attendance', category: 'attendance', priority: 'low', date: '2025-03-14T11:45:00', read: false, link: '../teacher/attendance.html' },
        { id: 5, title: 'Yangi talaba qo\'shildi', message: 'AT-102-20 guruhiga 3 ta yangi talaba qo\'shildi', type: 'system', category: 'system', priority: 'medium', date: '2025-03-15T09:20:00', read: true, link: '../teacher/groups.html' },
        { id: 6, title: 'Vazifa muddati o\'tdi', message: 'CSS animatsiyalar vazifasining muddati o\'tgan', type: 'deadline', category: 'task', priority: 'high', date: '2025-03-16T08:00:00', read: false, link: '../teacher/tasks.html' },
        { id: 7, title: 'Tizim yangilanishi', message: 'Tizim 20-mart kuni yangilanadi', type: 'system', category: 'system', priority: 'low', date: '2025-03-17T16:30:00', read: true, link: null }
    ];
    
    let remindersData = [
        { id: 1, title: 'Dars rejasini tayyorlash', description: 'Ertangi dars uchun reja tayyorlash', datetime: '2025-03-20T09:00', priority: 'high', completed: false },
        { id: 2, title: 'Vazifalarni tekshirish', description: 'Talabalar topshirgan vazifalarni tekshirish', datetime: '2025-03-19T15:00', priority: 'medium', completed: true },
        { id: 3, title: 'Kafedra yig'ilishi', description: 'Kafedra yig\'ilishi, soat 10:00', datetime: '2025-03-21T10:00', priority: 'high', completed: false }
    ];

    // ========== SAHIFA YUKLANGANDA ==========
    window.onload = function() {
        document.getElementById('reminderDateTime').value = new Date().toISOString().slice(0, 16);
        loadNotifications();
        loadReminders();
        updateStatistics();
    };

    function loadNotifications() {
        const container = document.getElementById('notificationsList');
        let filtered = [...notificationsData];
        
        // Apply category filter
        if (currentCategory !== 'all') {
            filtered = filtered.filter(n => n.category === currentCategory);
        }
        
        // Apply type filter
        if (currentTypeFilter !== 'all') {
            if (currentTypeFilter === 'unread') {
                filtered = filtered.filter(n => !n.read);
            } else {
                filtered = filtered.filter(n => n.type === currentTypeFilter);
            }
        }
        
        // Apply priority filter
        if (currentPriority !== 'all') {
            filtered = filtered.filter(n => n.priority === currentPriority);
        }
        
        // Apply date filter
        const now = new Date();
        if (currentDateRange === 'today') {
            filtered = filtered.filter(n => new Date(n.date).toDateString() === now.toDateString());
        } else if (currentDateRange === 'week') {
            const weekAgo = new Date(now.setDate(now.getDate() - 7));
            filtered = filtered.filter(n => new Date(n.date) >= weekAgo);
        } else if (currentDateRange === 'month') {
            const monthAgo = new Date(now.setMonth(now.getMonth() - 1));
            filtered = filtered.filter(n => new Date(n.date) >= monthAgo);
        }
        
        // Apply search
        if (currentSearch) {
            filtered = filtered.filter(n => n.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
                                          n.message.toLowerCase().includes(currentSearch.toLowerCase()));
        }
        
        // Sort by date (newest first)
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        container.innerHTML = '';
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="bg-white p-12 rounded-2xl text-center">
                    <i class="fas fa-bell-slash text-5xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">Bildirishnomalar yo'q</p>
                </div>
            `;
            return;
        }
        
        filtered.forEach(notif => {
            const isUnread = !notif.read;
            const date = new Date(notif.date);
            const timeAgo = getTimeAgo(date);
            
            let iconClass = '';
            let iconBg = '';
            if (notif.type === 'task') {
                iconClass = 'fa-tasks';
                iconBg = 'bg-orange-100 text-orange-600';
            } else if (notif.type === 'grade') {
                iconClass = 'fa-star';
                iconBg = 'bg-yellow-100 text-yellow-600';
            } else if (notif.type === 'attendance') {
                iconClass = 'fa-check-circle';
                iconBg = 'bg-green-100 text-green-600';
            } else if (notif.type === 'deadline') {
                iconClass = 'fa-exclamation-circle';
                iconBg = 'bg-red-100 text-red-600';
            } else {
                iconClass = 'fa-cog';
                iconBg = 'bg-gray-100 text-gray-600';
            }
            
            container.innerHTML += `
                <div class="notification-item ${isUnread ? 'unread' : ''} bg-white rounded-2xl p-4 shadow-sm cursor-pointer" onclick="showNotificationDetail(${notif.id})">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 ${iconBg} rounded-xl flex items-center justify-center text-xl">
                            <i class="fas ${iconClass}"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold ${isUnread ? 'text-blue-600' : 'text-gray-800'}">${notif.title}</h4>
                                <span class="text-xs text-gray-400">${timeAgo}</span>
                            </div>
                            <p class="text-sm text-gray-600 mt-1">${notif.message}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-xs px-2 py-1 rounded-full ${notif.priority === 'high' ? 'bg-red-100 text-red-600' : notif.priority === 'medium' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'}">
                                    ${notif.priority === 'high' ? 'Yuqori' : notif.priority === 'medium' ? 'O\'rtacha' : 'Past'}
                                </span>
                                ${isUnread ? '<span class="text-xs text-blue-600"><i class="fas fa-circle text-[6px] mr-1"></i> Yangi</span>' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function showNotificationDetail(notifId) {
        const notif = notificationsData.find(n => n.id === notifId);
        if (!notif) return;
        
        // Mark as read
        if (!notif.read) {
            notif.read = true;
            loadNotifications();
            updateStatistics();
        }
        
        const modalContent = `
            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-2xl">
                        <i class="fas ${notif.type === 'task' ? 'fa-tasks' : notif.type === 'grade' ? 'fa-star' : notif.type === 'attendance' ? 'fa-check-circle' : notif.type === 'deadline' ? 'fa-exclamation-circle' : 'fa-cog'}"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-lg">${notif.title}</h4>
                        <p class="text-sm text-gray-500">${new Date(notif.date).toLocaleString('uz-UZ')}</p>
                    </div>
                </div>
                
                <div class="bg-gray-50 p-4 rounded-xl">
                    <p class="text-gray-700">${notif.message}</p>
                </div>
                
                <div class="flex gap-3">
                    ${notif.link ? `
                        <button onclick="window.location.href='${notif.link}'" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700">
                            <i class="fas fa-eye mr-2"></i> Ko'rish
                        </button>
                    ` : ''}
                    <button onclick="closeNotificationModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                        Yopish
                    </button>
                </div>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = modalContent;
        document.getElementById('notificationModal').style.display = 'flex';
    }

    function loadReminders() {
        const container = document.getElementById('remindersList');
        const sorted = [...remindersData].sort((a, b) => {
            if (a.completed === b.completed) return new Date(a.datetime) - new Date(b.datetime);
            return a.completed ? 1 : -1;
        });
        
        container.innerHTML = '';
        
        if (sorted.length === 0) {
            container.innerHTML = `
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-clock text-4xl text-gray-300 mb-2"></i>
                    <p>Eslatmalar yo'q</p>
                </div>
            `;
            return;
        }
        
        sorted.forEach(reminder => {
            const date = new Date(reminder.datetime);
            const isPast = date < new Date() && !reminder.completed;
            const priorityClass = reminder.priority === 'high' ? 'reminder-high' : 
                                 reminder.priority === 'medium' ? 'reminder-medium' : 'reminder-low';
            
            container.innerHTML += `
                <div class="reminder-card ${reminder.completed ? 'completed' : ''} ${priorityClass}">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold ${reminder.completed ? 'line-through text-gray-500' : 'text-gray-800'}">${reminder.title}</h4>
                            <p class="text-sm text-gray-500 mt-1">${reminder.description}</p>
                            <div class="flex items-center gap-3 mt-2">
                                <span class="text-xs text-gray-400">
                                    <i class="far fa-calendar mr-1"></i> ${date.toLocaleDateString('uz-UZ')}
                                </span>
                                <span class="text-xs text-gray-400">
                                    <i class="far fa-clock mr-1"></i> ${date.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' })}
                                </span>
                                ${isPast ? '<span class="text-xs text-red-600"><i class="fas fa-exclamation-circle mr-1"></i> Vaqti o\'tgan</span>' : ''}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${!reminder.completed ? `
                                <button onclick="completeReminder(${reminder.id})" class="w-8 h-8 bg-green-100 text-green-600 rounded-lg hover:bg-green-200">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button onclick="editReminder(${reminder.id})" class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200">
                                    <i class="fas fa-edit"></i>
                                </button>
                            ` : ''}
                            <button onclick="deleteReminder(${reminder.id})" class="w-8 h-8 bg-red-100 text-red-600 rounded-lg hover:bg-red-200">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function addReminder() {
        const title = document.getElementById('reminderTitle').value;
        const desc = document.getElementById('reminderDesc').value;
        const datetime = document.getElementById('reminderDateTime').value;
        const priority = document.getElementById('reminderPriority').value;
        
        if (!title || !datetime) {
            showToast('Sarlavha va vaqt majburiy!', 'error');
            return;
        }
        
        remindersData.push({
            id: remindersData.length + 1,
            title: title,
            description: desc || '',
            datetime: datetime,
            priority: priority,
            completed: false
        });
        
        loadReminders();
        closeReminderModal();
        showToast('Eslatma qo\'shildi!', 'success');
    }

    function completeReminder(id) {
        const reminder = remindersData.find(r => r.id === id);
        if (reminder) {
            reminder.completed = true;
            loadReminders();
            showToast('Eslatma bajarildi!', 'success');
        }
    }

    function editReminder(id) {
        const reminder = remindersData.find(r => r.id === id);
        if (!reminder) return;
        
        document.getElementById('reminderTitle').value = reminder.title;
        document.getElementById('reminderDesc').value = reminder.description;
        document.getElementById('reminderDateTime').value = reminder.datetime;
        document.getElementById('reminderPriority').value = reminder.priority;
        
        showReminderModal();
        
        const originalAdd = addReminder;
        window.addReminder = function() {
            reminder.title = document.getElementById('reminderTitle').value;
            reminder.description = document.getElementById('reminderDesc').value;
            reminder.datetime = document.getElementById('reminderDateTime').value;
            reminder.priority = document.getElementById('reminderPriority').value;
            
            loadReminders();
            closeReminderModal();
            showToast('Eslatma yangilandi!', 'success');
            window.addReminder = originalAdd;
        };
    }

    function deleteReminder(id) {
        if (confirm('Haqiqatan ham bu eslatmani o\'chirmoqchimisiz?')) {
            remindersData = remindersData.filter(r => r.id !== id);
            loadReminders();
            showToast('Eslatma o\'chirildi!', 'success');
        }
    }

    function updateStatistics() {
        const total = notificationsData.length;
        const unread = notificationsData.filter(n => !n.read).length;
        const tasks = notificationsData.filter(n => n.type === 'task').length;
        const deadlines = notificationsData.filter(n => n.type === 'deadline').length;
        
        document.getElementById('totalCount').textContent = total;
        document.getElementById('unreadCount').textContent = unread;
        document.getElementById('taskCount').textContent = tasks;
        document.getElementById('deadlineCount').textContent = deadlines;
    }

    function markAllAsRead() {
        notificationsData.forEach(n => n.read = true);
        loadNotifications();
        updateStatistics();
        showToast('Barcha bildirishnomalar o\'qildi', 'success');
    }

    function clearAllNotifications() {
        if (confirm('Haqiqatan ham barcha bildirishnomalarni o\'chirmoqchimisiz?')) {
            notificationsData = [];
            loadNotifications();
            updateStatistics();
            showToast('Barcha bildirishnomalar o\'chirildi', 'success');
        }
    }

    function filterByCategory(category) {
        currentCategory = category;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('tab-active');
        });
        document.getElementById(`tab${category.charAt(0).toUpperCase() + category.slice(1)}`).classList.add('tab-active');
        
        loadNotifications();
    }

    function filterByType(type) {
        currentTypeFilter = type;
        loadNotifications();
    }

    function filterByPriority() {
        currentPriority = document.getElementById('priorityFilter').value;
        loadNotifications();
    }

    function filterByDate() {
        currentDateRange = document.getElementById('dateFilter').value;
        loadNotifications();
    }

    function searchNotifications() {
        currentSearch = document.getElementById('searchInput').value;
        loadNotifications();
    }

    function getTimeAgo(date) {
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 1) return 'Hozir';
        if (diffMins < 60) return `${diffMins} daqiqa oldin`;
        if (diffHours < 24) return `${diffHours} soat oldin`;
        if (diffDays < 7) return `${diffDays} kun oldin`;
        return date.toLocaleDateString('uz-UZ');
    }

    function showReminderModal() {
        document.getElementById('reminderModal').style.display = 'flex';
    }

    function closeReminderModal() {
        document.getElementById('reminderModal').style.display = 'none';
        document.getElementById('reminderTitle').value = '';
        document.getElementById('reminderDesc').value = '';
        document.getElementById('reminderDateTime').value = new Date().toISOString().slice(0, 16);
        document.getElementById('reminderPriority').value = 'medium';
    }

    function showAddReminderModal() {
        showReminderModal();
    }

    function closeNotificationModal() {
        document.getElementById('notificationModal').style.display = 'none';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast toast-${type}`;
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ========== NAVIGATSIYA ==========
    function goToDashboard() {
        window.location.href = 'dashboard.html';
    }
    
    function goToProfile() {
        window.location.href = '../shared/profile.html?role=teacher';
    }
    
    function logout() {
        if (confirm('Tizimdan chiqmoqchimisiz?')) {
            window.location.href = '../../index.html';
        }
    }
    
    window.onclick = function(event) {
        const notificationModal = document.getElementById('notificationModal');
        const reminderModal = document.getElementById('reminderModal');
        if (event.target === notificationModal) closeNotificationModal();
        if (event.target === reminderModal) closeReminderModal();
    }
</script>

</body>
</html>
