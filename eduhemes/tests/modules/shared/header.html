<!-- ========== HEADER ========== -->
<div class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl text-gray-800">EduHemis</h1>
                    <p class="text-xs text-gray-500">Universitet axborot tizimi</p>
                </div>
            </div>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center gap-8">
                <a href="dashboard.html" class="text-gray-600 hover:text-blue-600 transition-colors">
                    <i class="fas fa-home mr-2"></i> Bosh sahifa
                </a>
                <a href="profile.html" class="text-gray-600 hover:text-blue-600 transition-colors">
                    <i class="fas fa-user mr-2"></i> Profil
                </a>
                <a href="settings.html" class="text-gray-600 hover:text-blue-600 transition-colors">
                    <i class="fas fa-cog mr-2"></i> Sozlamalar
                </a>
            </div>

            <!-- Right Side -->
            <div class="flex items-center gap-6">
                <!-- Notifications -->
                <div class="relative">
                    <i class="fas fa-bell text-2xl text-gray-600 cursor-pointer hover:text-blue-600 transition-colors" onclick="showNotifications()"></i>
                    <span id="notificationCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">3</span>
                </div>

                <!-- Messages -->
                <div class="relative">
                    <i class="fas fa-envelope text-2xl text-gray-600 cursor-pointer hover:text-blue-600 transition-colors" onclick="showMessages()"></i>
                    <span id="messageCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">2</span>
                </div>

                <!-- User Info -->
                <div class="text-right hidden md:block">
                    <p id="userName" class="font-bold text-gray-800">Azimjon Karimov</p>
                    <p id="userRole" class="text-xs text-gray-500">Talaba</p>
                </div>

                <!-- User Avatar -->
                <div class="relative cursor-pointer" onclick="goToProfile()">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" 
                         class="w-12 h-12 rounded-xl border-2 border-blue-600 shadow-md">
                    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>
                </div>

                <!-- Logout -->
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-all flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="hidden md:inline">Chiqish</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Mobile Menu Button -->
<div class="md:hidden fixed bottom-6 right-6 z-50">
    <button onclick="toggleMobileMenu()" class="w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-blue-700 transition-all">
        <i class="fas fa-bars"></i>
    </button>
</div>

<!-- Mobile Menu -->
<div id="mobileMenu" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" onclick="toggleMobileMenu()">
    <div class="absolute right-0 top-0 w-64 h-full bg-white shadow-xl p-6" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-lg">Menyu</h3>
            <button onclick="toggleMobileMenu()" class="text-2xl text-gray-500">&times;</button>
        </div>
        
        <div class="flex flex-col space-y-4">
            <a href="dashboard.html" class="py-2 text-gray-700 hover:text-blue-600 transition-colors">
                <i class="fas fa-home w-6 mr-3"></i> Bosh sahifa
            </a>
            <a href="profile.html" class="py-2 text-gray-700 hover:text-blue-600 transition-colors">
                <i class="fas fa-user w-6 mr-3"></i> Profil
            </a>
            <a href="settings.html" class="py-2 text-gray-700 hover:text-blue-600 transition-colors">
                <i class="fas fa-cog w-6 mr-3"></i> Sozlamalar
            </a>
            <hr class="my-2">
            <button onclick="logout()" class="py-2 text-red-600 hover:text-red-700 transition-colors text-left">
                <i class="fas fa-sign-out-alt w-6 mr-3"></i> Chiqish
            </button>
        </div>
    </div>
</div>

<script>
    // ========== HEADER FUNKSIYALARI ==========
    
    // Foydalanuvchi ma'lumotlarini yangilash
    function updateUserInfo(user) {
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userRole').textContent = 
            user.role === 'student' ? 'Talaba' : 
            user.role === 'teacher' ? "O'qituvchi" : 'Admin';
        
        const colors = {
            student: '0284c7',
            teacher: '4f46e5',
            admin: 'dc2626'
        };
        document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${user.name.split(' ').join('+')}&background=${colors[user.role]}&color=fff`;
    }
    
    // Bildirishnomalarni ko'rsatish
    function showNotifications() {
        // Bildirishnomalar modalini ochish
        if (typeof openNotificationsModal === 'function') {
            openNotificationsModal();
        } else {
            alert('Bildirishnomalar');
        }
    }
    
    // Xabarlarni ko'rsatish
    function showMessages() {
        // Xabarlar modalini ochish
        if (typeof openMessagesModal === 'function') {
            openMessagesModal();
        } else {
            alert('Xabarlar');
        }
    }
    
    // Profilga o'tish
    function goToProfile() {
        window.location.href = 'profile.html';
    }
    
    // Chiqish
    function logout() {
        if (confirm('Tizimdan chiqmoqchimisiz?')) {
            localStorage.removeItem('currentUser');
            window.location.href = '../../index.html';
        }
    }
    
    // Mobil menyuni ochish/yopish
    function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('hidden');
    }
    
    // Bildirishnoma belgisini yangilash
    function updateNotificationBadge(count) {
        const badge = document.getElementById('notificationCount');
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }
    
    // Xabar belgisini yangilash
    function updateMessageBadge(count) {
        const badge = document.getElementById('messageCount');
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }
    
    // Sahifa yuklanganda foydalanuvchi ma'lumotlarini yuklash
    document.addEventListener('DOMContentLoaded', function() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            updateUserInfo(user);
        }
        
        // Test uchun bildirishnoma soni
        updateNotificationBadge(3);
        updateMessageBadge(2);
    });
</script>
