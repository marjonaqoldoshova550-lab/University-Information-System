<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baholar - EduHemis</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .animate-fadeIn { animation: fadeIn 0.5s ease; }
        .animate-slideIn { animation: slideIn 0.3s ease; }
        
        .card-hover {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .grade-5 { background: #10b981; color: white; }
        .grade-4 { background: #3b82f6; color: white; }
        .grade-3 { background: #f59e0b; color: white; }
        .grade-2 { background: #ef4444; color: white; }
        
        .grade-badge {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .grade-badge:hover {
            transform: scale(1.1);
        }
        
        .tab-btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-active {
            background: #3b82f6;
            color: white;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .student-row {
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .student-row:hover {
            background: #f3f4f6;
        }
        
        .exam-cell {
            text-align: center;
            padding: 12px;
        }
        
        .exam-input {
            width: 60px;
            padding: 6px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }
        
        .exam-input:focus {
            border-color: #3b82f6;
            outline: none;
            ring: 2px solid #3b82f6;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s;
        }
    </style>
</head>
<body class="bg-gray-100">

<!-- ========== HEADER ========== -->
<div class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fas fa-star"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl text-gray-800">EduHemis</h1>
                    <p class="text-xs text-gray-500">Baholar boshqaruvi</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="goToDashboard()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-all flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden md:inline">Bosh sahifa</span>
                </button>
                <div class="text-right hidden md:block">
                    <p class="font-bold text-gray-800">Said Alisherov</p>
                    <p class="text-xs text-gray-500">O'qituvchi • Veb dasturlash</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Said+Alisherov&background=4f46e5&color=fff" 
                     class="w-10 h-10 rounded-full border-2 border-purple-600 cursor-pointer" onclick="goToProfile()">
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page Title -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">📊 Baholar</h1>
        <button onclick="exportGrades()" class="px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-all flex items-center gap-2">
            <i class="fas fa-download"></i>
            <span>Eksport</span>
        </button>
    </div>

    <!-- Statistics Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Guruh o'rtacha</p>
                    <h3 class="text-2xl font-bold mt-1" id="groupAverage">4.6</h3>
                </div>
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-chart-line"></i>
                </div>
            </div>
            <div class="mt-4 progress-bar">
                <div class="progress-fill" style="width: 92%"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">A'lo (5)</p>
                    <h3 class="text-2xl font-bold mt-1 text-green-600" id="excellentCount">24</h3>
                </div>
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-star"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Yaxshi (4)</p>
                    <h3 class="text-2xl font-bold mt-1 text-blue-600" id="goodCount">18</h3>
                </div>
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-thumbs-up"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Qoniqarli (3)</p>
                    <h3 class="text-2xl font-bold mt-1 text-orange-600" id="satisfactoryCount">8</h3>
                </div>
                <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-check"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-white rounded-3xl shadow-sm p-6">
            <h3 class="text-xl font-bold mb-4">📈 GPA dinamikasi</h3>
            <canvas id="gpaChart" height="200"></canvas>
        </div>
        <div class="bg-white rounded-3xl shadow-sm p-6">
            <h3 class="text-xl font-bold mb-4">🥧 Baholar taqsimoti</h3>
            <canvas id="distributionChart" height="200"></canvas>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Talaba ismi bo'yicha qidirish..." onkeyup="filterStudents()">
            </div>
            <select id="examFilter" class="p-3 border rounded-xl bg-white" onchange="filterStudents()">
                <option value="all">Barcha imtihonlar</option>
                <option value="1">1-imtihon</option>
                <option value="2">2-imtihon</option>
                <option value="3">3-imtihon</option>
                <option value="final">Yakuniy</option>
            </select>
            <select id="sortFilter" class="p-3 border rounded-xl bg-white" onchange="sortStudents()">
                <option value="name">Ism bo'yicha</option>
                <option value="average">O'rtacha bo'yicha</option>
                <option value="attendance">Davomat bo'yicha</option>
            </select>
        </div>
    </div>

    <!-- Grade Table -->
    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4 text-left">Talaba</th>
                        <th class="p-4 text-center">1-imtihon</th>
                        <th class="p-4 text-center">2-imtihon</th>
                        <th class="p-4 text-center">3-imtihon</th>
                        <th class="p-4 text-center">Yakuniy</th>
                        <th class="p-4 text-center">O'rtacha</th>
                        <th class="p-4 text-center">Harfli</th>
                        <th class="p-4 text-center">Davomat</th>
                        <th class="p-4 text-center"></th>
                    </tr>
                </thead>
                <tbody id="gradesTable">
                    <!-- Students will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Save Button -->
    <div class="flex justify-end mt-6">
        <button onclick="saveAllGrades()" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center gap-2">
            <i class="fas fa-save"></i>
            <span>Barcha o'zgarishlarni saqlash</span>
        </button>
    </div>

</div>

<!-- Grade Modal -->
<div id="gradeModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 max-w-md w-full">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold">📝 Bahoni tahrirlash</h3>
            <button onclick="closeGradeModal()" class="text-2xl text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="gradeModalContent"></div>
    </div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-xl text-white font-medium shadow-2xl hidden animate-slideIn z-50"></div>

<script>
    // ========== MA'LUMOTLAR ==========
    let currentGroup = 'AT-101-20';
    let gpaChart = null;
    let distributionChart = null;
    
    let studentsData = [
        { id: 7, name: 'Azimjon Karimov', exam1: 5, exam2: 5, exam3: 4, final: 5, attendance: 95, email: 'a.karimov@student.uz' },
        { id: 8, name: 'Ali Valiyev', exam1: 5, exam2: 5, exam3: 5, final: 5, attendance: 98, email: 'a.valiyev@student.uz' },
        { id: 9, name: 'Dilya Akramova', exam1: 4, exam2: 5, exam3: 5, final: 5, attendance: 92, email: 'd.akramova@student.uz' },
        { id: 10, name: 'Jasur Karimov', exam1: 3, exam2: 4, exam3: 4, final: 4, attendance: 88, email: 'j.karimov@student.uz' },
        { id: 15, name: 'Shoxrux Aliyev', exam1: 4, exam2: 3, exam3: 4, final: 4, attendance: 85, email: 'sh.aliyev@student.uz' },
        { id: 16, name: 'Nilufar Rahimova', exam1: 5, exam2: 4, exam3: 5, final: 5, attendance: 96, email: 'n.rahimova@student.uz' }
    ];

    // ========== SAHIFA YUKLANGANDA ==========
    window.onload = function() {
        loadGrades();
        initCharts();
        updateStatistics();
    };

    function loadGrades() {
        const tbody = document.getElementById('gradesTable');
        let filteredStudents = [...studentsData];
        
        // Apply search
        const search = document.getElementById('searchInput').value.toLowerCase();
        if (search) {
            filteredStudents = filteredStudents.filter(s => s.name.toLowerCase().includes(search));
        }
        
        // Apply exam filter
        const examFilter = document.getElementById('examFilter').value;
        
        tbody.innerHTML = '';
        
        filteredStudents.forEach(student => {
            const avg = ((student.exam1 + student.exam2 + student.exam3 + student.final) / 4).toFixed(1);
            const letterGrade = getLetterGrade(avg);
            const attendanceColor = student.attendance >= 90 ? 'text-green-600' : 
                                   student.attendance >= 75 ? 'text-yellow-600' : 'text-red-600';
            
            tbody.innerHTML += `
                <tr class="border-t student-row">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=${student.name.split(' ').join('+')}&background=3b82f6&color=fff" class="w-10 h-10 rounded-full">
                            <div>
                                <p class="font-medium">${student.name}</p>
                                <p class="text-xs text-gray-500">${student.email}</p>
                            </div>
                        </div>
                    </td>
                    <td class="exam-cell">
                        <input type="number" id="exam1-${student.id}" value="${student.exam1}" min="2" max="5" step="1" 
                               class="exam-input" onchange="updateGrade(${student.id}, 'exam1', this.value)">
                    </td>
                    <td class="exam-cell">
                        <input type="number" id="exam2-${student.id}" value="${student.exam2}" min="2" max="5" step="1" 
                               class="exam-input" onchange="updateGrade(${student.id}, 'exam2', this.value)">
                    </td>
                    <td class="exam-cell">
                        <input type="number" id="exam3-${student.id}" value="${student.exam3}" min="2" max="5" step="1" 
                               class="exam-input" onchange="updateGrade(${student.id}, 'exam3', this.value)">
                    </td>
                    <td class="exam-cell">
                        <input type="number" id="final-${student.id}" value="${student.final}" min="2" max="5" step="1" 
                               class="exam-input" onchange="updateGrade(${student.id}, 'final', this.value)">
                    </td>
                    <td class="exam-cell">
                        <span class="font-bold text-lg ${getGradeColor(avg)}">${avg}</span>
                    </td>
                    <td class="exam-cell">
                        <span class="grade-badge ${getGradeClass(letterGrade)}">${letterGrade}</span>
                    </td>
                    <td class="exam-cell">
                        <span class="font-medium ${attendanceColor}">${student.attendance}%</span>
                    </td>
                    <td class="exam-cell">
                        <button onclick="showStudentDetails(${student.id})" class="text-blue-600 hover:text-blue-800">
                            <i class="fas fa-chart-line"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        updateStatistics();
        updateCharts();
    }

    function updateGrade(studentId, examType, value) {
        const student = studentsData.find(s => s.id === studentId);
        if (student) {
            const grade = parseInt(value);
            if (grade >= 2 && grade <= 5) {
                student[examType] = grade;
                updateStudentAverage(studentId);
            }
        }
    }

    function updateStudentAverage(studentId) {
        const student = studentsData.find(s => s.id === studentId);
        if (student) {
            const avg = ((student.exam1 + student.exam2 + student.exam3 + student.final) / 4).toFixed(1);
            const row = document.querySelector(`tr:has(#exam1-${studentId})`);
            if (row) {
                const avgCell = row.cells[5];
                avgCell.innerHTML = `<span class="font-bold text-lg ${getGradeColor(avg)}">${avg}</span>`;
                
                const letterCell = row.cells[6];
                const letterGrade = getLetterGrade(avg);
                letterCell.innerHTML = `<span class="grade-badge ${getGradeClass(letterGrade)}">${letterGrade}</span>`;
            }
        }
    }

    function saveAllGrades() {
        showToast('Barcha baholar muvaffaqiyatli saqlandi!', 'success');
    }

    function filterStudents() {
        loadGrades();
    }

    function sortStudents() {
        const sortBy = document.getElementById('sortFilter').value;
        if (sortBy === 'name') {
            studentsData.sort((a, b) => a.name.localeCompare(b.name));
        } else if (sortBy === 'average') {
            const avgA = (a.exam1 + a.exam2 + a.exam3 + a.final) / 4;
            const avgB = (b.exam1 + b.exam2 + b.exam3 + b.final) / 4;
            studentsData.sort((a, b) => avgB - avgA);
        } else if (sortBy === 'attendance') {
            studentsData.sort((a, b) => b.attendance - a.attendance);
        }
        loadGrades();
    }

    function updateStatistics() {
        let total = 0;
        let excellent = 0;
        let good = 0;
        let satisfactory = 0;
        
        studentsData.forEach(student => {
            const avg = (student.exam1 + student.exam2 + student.exam3 + student.final) / 4;
            total += avg;
            
            if (avg >= 4.5) excellent++;
            else if (avg >= 3.5) good++;
            else if (avg >= 2.5) satisfactory++;
        });
        
        const groupAvg = (total / studentsData.length).toFixed(1);
        
        document.getElementById('groupAverage').textContent = groupAvg;
        document.getElementById('excellentCount').textContent = excellent;
        document.getElementById('goodCount').textContent = good;
        document.getElementById('satisfactoryCount').textContent = satisfactory;
    }

    function initCharts() {
        const ctx1 = document.getElementById('gpaChart').getContext('2d');
        gpaChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['1-imtihon', '2-imtihon', '3-imtihon', 'Yakuniy'],
                datasets: [{
                    label: 'Guruh o\'rtacha',
                    data: [4.3, 4.4, 4.5, 4.6],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 5 } }
            }
        });
        
        const ctx2 = document.getElementById('distributionChart').getContext('2d');
        distributionChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['A\'lo (5)', 'Yaxshi (4)', 'Qoniqarli (3)', 'Qoniqarsiz (2)'],
                datasets: [{
                    data: [24, 18, 8, 2],
                    backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    function updateCharts() {
        if (gpaChart) {
            gpaChart.data.datasets[0].data = calculateExamAverages();
            gpaChart.update();
        }
        
        if (distributionChart) {
            const distribution = calculateGradeDistribution();
            distributionChart.data.datasets[0].data = distribution;
            distributionChart.update();
        }
    }

    function calculateExamAverages() {
        let exam1Total = 0, exam2Total = 0, exam3Total = 0, finalTotal = 0;
        studentsData.forEach(s => {
            exam1Total += s.exam1;
            exam2Total += s.exam2;
            exam3Total += s.exam3;
            finalTotal += s.final;
        });
        const count = studentsData.length;
        return [
            (exam1Total / count).toFixed(1),
            (exam2Total / count).toFixed(1),
            (exam3Total / count).toFixed(1),
            (finalTotal / count).toFixed(1)
        ];
    }

    function calculateGradeDistribution() {
        let excellent = 0, good = 0, satisfactory = 0, poor = 0;
        studentsData.forEach(s => {
            const avg = (s.exam1 + s.exam2 + s.exam3 + s.final) / 4;
            if (avg >= 4.5) excellent++;
            else if (avg >= 3.5) good++;
            else if (avg >= 2.5) satisfactory++;
            else poor++;
        });
        return [excellent, good, satisfactory, poor];
    }

    function showStudentDetails(studentId) {
        const student = studentsData.find(s => s.id === studentId);
        if (!student) return;
        
        const avg = ((student.exam1 + student.exam2 + student.exam3 + student.final) / 4).toFixed(1);
        const letterGrade = getLetterGrade(avg);
        
        const modalContent = `
            <div class="text-center">
                <img src="https://ui-avatars.com/api/?name=${student.name.split(' ').join('+')}&background=3b82f6&color=fff" class="w-20 h-20 rounded-full mx-auto mb-3">
                <h4 class="text-xl font-bold">${student.name}</h4>
                <p class="text-gray-500">${student.email}</p>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-blue-50 p-3 rounded-xl">
                    <p class="text-xs text-gray-500">1-imtihon</p>
                    <p class="text-2xl font-bold ${getGradeColor(student.exam1)}">${student.exam1}</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-xl">
                    <p class="text-xs text-gray-500">2-imtihon</p>
                    <p class="text-2xl font-bold ${getGradeColor(student.exam2)}">${student.exam2}</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-xl">
                    <p class="text-xs text-gray-500">3-imtihon</p>
                    <p class="text-2xl font-bold ${getGradeColor(student.exam3)}">${student.exam3}</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-xl">
                    <p class="text-xs text-gray-500">Yakuniy</p>
                    <p class="text-2xl font-bold ${getGradeColor(student.final)}">${student.final}</p>
                </div>
            </div>
            
            <div class="mt-4 p-4 bg-gray-50 rounded-xl">
                <div class="flex justify-between items-center">
                    <span class="font-medium">O'rtacha baho:</span>
                    <span class="text-2xl font-bold ${getGradeColor(avg)}">${avg}</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="font-medium">Harfli baho:</span>
                    <span class="grade-badge ${getGradeClass(letterGrade)}">${letterGrade}</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="font-medium">Davomat:</span>
                    <span class="font-bold ${student.attendance >= 90 ? 'text-green-600' : student.attendance >= 75 ? 'text-yellow-600' : 'text-red-600'}">${student.attendance}%</span>
                </div>
            </div>
            
            <button onclick="closeGradeModal()" class="w-full bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300 mt-4">
                Yopish
            </button>
        `;
        
        document.getElementById('gradeModalContent').innerHTML = modalContent;
        document.getElementById('gradeModal').style.display = 'flex';
    }

    function exportGrades() {
        let csv = "Talaba,1-imtihon,2-imtihon,3-imtihon,Yakuniy,O'rtacha,Harfli,Davomat\n";
        studentsData.forEach(s => {
            const avg = ((s.exam1 + s.exam2 + s.exam3 + s.final) / 4).toFixed(1);
            const letter = getLetterGrade(avg);
            csv += `${s.name},${s.exam1},${s.exam2},${s.exam3},${s.final},${avg},${letter},${s.attendance}%\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `grades_${currentGroup}_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        
        showToast('Baholar eksport qilindi!', 'success');
    }

    function getLetterGrade(avg) {
        if (avg >= 4.5) return 'A';
        if (avg >= 3.5) return 'B';
        if (avg >= 2.5) return 'C';
        return 'F';
    }

    function getGradeColor(grade) {
        if (grade >= 4.5) return 'text-green-600';
        if (grade >= 3.5) return 'text-blue-600';
        if (grade >= 2.5) return 'text-orange-600';
        return 'text-red-600';
    }

    function getGradeClass(grade) {
        if (grade === 'A') return 'grade-5';
        if (grade === 'B') return 'grade-4';
        if (grade === 'C') return 'grade-3';
        return 'grade-2';
    }

    function closeGradeModal() {
        document.getElementById('gradeModal').style.display = 'none';
    }

    // ========== NAVIGATSIYA ==========
    function goToDashboard() {
        window.location.href = 'dashboard.html';
    }
    
    function goToProfile() {
        window.location.href = '../shared/profile.html?role=teacher';
    }
    
    function logout() {
        if (confirm('Tizimdan chiqmoqchimisiz?')) {
            window.location.href = '../../index.html';
        }
    }
    
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add(type === 'success' ? 'bg-green-500' : 
                          type === 'error' ? 'bg-red-500' : 
                          type === 'warning' ? 'bg-orange-500' : 'bg-blue-500');
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-orange-500', 'bg-blue-500');
        }, 3000);
    }
    
    window.onclick = function(event) {
        const gradeModal = document.getElementById('gradeModal');
        if (event.target === gradeModal) closeGradeModal();
    }
</script>

</body>
