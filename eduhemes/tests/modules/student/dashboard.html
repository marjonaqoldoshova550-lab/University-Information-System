<!DOCTYPE html>
<html lang="uz">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-fadeIn { animation: fadeIn 0.5s ease; }
        .animate-slideIn { animation: slideIn 0.3s ease; }
        .animate-pulse { animation: pulse 2s infinite; }

        .card-hover {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .deadline-red {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
        }

        .deadline-yellow {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
        }

        .deadline-green {
            background-color: #dcfce7;
            border-left: 4px solid #22c55e;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-online {
            position: relative;
        }

        .status-online::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            bottom: 2px;
            right: 2px;
            border: 2px solid white;
        }
    </style>
</head>
<body class="bg-gray-100">

<!-- ========== HEADER ========== -->
<div class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl text-gray-800">EduHemis</h1>
                    <p class="text-xs text-gray-500" id="roleDisplay">Universitet portali</p>
                </div>
            </div>

            <!-- Right Side -->
            <div class="flex items-center gap-6">
                <!-- Notifications -->
                <div class="relative">
                    <i class="fas fa-bell text-2xl text-gray-600 cursor-pointer hover:text-blue-600 transition-colors" onclick="showNotifications()"></i>
                    <span id="notificationCount" class="notification-badge hidden">0</span>
                </div>

                <!-- Messages -->
                <div class="relative">
                    <i class="fas fa-envelope text-2xl text-gray-600 cursor-pointer hover:text-blue-600 transition-colors" onclick="showMessages()"></i>
                    <span id="messageCount" class="notification-badge hidden">0</span>
                </div>

                <!-- User Info -->
                <div class="text-right hidden md:block">

                    <p id="userRole" class="text-xs text-gray-500">Rol</p>

                    <i class="fas fa-sign-out-alt"></i>
                    <span class="hidden md:inline">Chiqish</span>
                </button>
            </div>

    </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="max-w-7xl mx-auto px-6 py-6">

<!-- ========== MODAL ========== -->

<!-- ========== TOAST ========== -->
<div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-xl text-white font-medium shadow-2xl hidden animate-slideIn z-50"></div>

    let currentUser = null;
    
    // Test ma'lumotlar
    const USERS = {
        admin: {
            id: 1,
            name: 'Admin User',
            role: 'admin',
            email: 'admin@edu.uz',
            avatar: 'https://ui-avatars.com/api/?name=Admin+User&background=dc2626&color=fff'
        },
        teacher: {
            id: 2,
            name: 'Said Alisherov',
            role: 'teacher',
            email: 's.alisherov@edu.uz',
            subject: 'Veb dasturlash',
            avatar: 'https://ui-avatars.com/api/?name=Said+Alisherov&background=4f46e5&color=fff'

            id: 3,

            role: 'student',
            email: 'a.karimov@student.uz',

    // ========== SAHIFA YUKLANGANDA ==========
    window.onload = function() {
        // URL dan foydalanuvchi rolini olish (test uchun)
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'student';
        
        // Foydalanuvchini yuklash
        loadUser(role);
    };

    function loadUser(role) {
        currentUser = USERS[role];
        
        // Header ma'lumotlarini yangilash
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = 
            currentUser.role === 'admin' ? 'Administrator' :
            currentUser.role === 'teacher' ? 'O\'qituvchi' : 'Talaba';
        document.getElementById('roleDisplay').textContent = 
            currentUser.role === 'admin' ? 'Admin paneli' :
            currentUser.role === 'teacher' ? 'O\'qituvchi paneli' : 'Talaba paneli';
        document.getElementById('userAvatar').src = currentUser.avatar;
        
        // Dashboardni yuklash
        loadDashboard();
        
        // Bildirishnomalarni yangilash
        updateNotifications();
    }

    function loadDashboard() {
        if (currentUser.role === 'admin') {
            showAdminDashboard();
        } else if (currentUser.role === 'teacher') {
            showTeacherDashboard();
        } else {
            showStudentDashboard();
        }
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        
        if (type === 'success') toast.classList.add('bg-green-500');
        else if (type === 'error') toast.classList.add('bg-red-500');
        else if (type === 'warning') toast.classList.add('bg-orange-500');
        else toast.classList.add('bg-blue-500');
        
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-orange-500', 'bg-blue-500');
        }, 3000);
    }
