<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guruhlar - EduHemis</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .animate-fadeIn { animation: fadeIn 0.5s ease; }
        .animate-slideIn { animation: slideIn 0.3s ease; }
        
        .card-hover {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-active {
            background: #3b82f6;
            color: white;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-gray-100">

<!-- ========== HEADER ========== -->
<div class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl text-gray-800">EduHemis</h1>
                    <p class="text-xs text-gray-500">Guruhlar boshqaruvi</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="goToDashboard()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-all flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden md:inline">Bosh sahifa</span>
                </button>
                <div class="text-right hidden md:block">
                    <p id="userName" class="font-bold text-gray-800">Said Alisherov</p>
                    <p class="text-xs text-gray-500">O'qituvchi • Veb dasturlash</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Said+Alisherov&background=4f46e5&color=fff" 
                     class="w-10 h-10 rounded-full border-2 border-purple-600 cursor-pointer" onclick="goToProfile()">
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page Title -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">👥 Mening guruhlarim</h1>
        <button onclick="showAddGroupModal()" class="px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-all flex items-center gap-2">
            <i class="fas fa-plus"></i>
            <span>Yangi guruh</span>
        </button>
    </div>

    <!-- Search and Filter -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Guruh nomi bo'yicha qidirish..." onkeyup="searchGroups()">
            </div>
            <select id="courseFilter" class="p-3 border rounded-xl bg-white" onchange="filterGroups()">
                <option value="all">Barcha kurslar</option>
                <option value="1">1-kurs</option>
                <option value="2">2-kurs</option>
                <option value="3">3-kurs</option>
                <option value="4">4-kurs</option>
            </select>
            <select id="statusFilter" class="p-3 border rounded-xl bg-white" onchange="filterGroups()">
                <option value="all">Barcha holatlar</option>
                <option value="active">Faol guruhlar</option>
                <option value="inactive">Arxiv guruhlar</option>
            </select>
        </div>
    </div>

    <!-- Groups Grid -->
    <div id="groupsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
        <!-- Groups will be loaded here -->
    </div>

    <!-- Statistics -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <p class="text-3xl font-bold text-blue-600" id="totalGroups">3</p>
            <p class="text-sm text-gray-500">Jami guruhlar</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <p class="text-3xl font-bold text-green-600" id="totalStudents">74</p>
            <p class="text-sm text-gray-500">Jami talabalar</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <p class="text-3xl font-bold text-purple-600" id="avgAttendance">94%</p>
            <p class="text-sm text-gray-500">O'rtacha davomat</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <p class="text-3xl font-bold text-orange-600" id="avgGrade">4.6</p>
            <p class="text-sm text-gray-500">O'rtacha baho</p>
        </div>
    </div>

</div>

<!-- Group Details Modal -->
<div id="groupModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold" id="modalTitle">Guruh ma'lumotlari</h3>
            <button onclick="closeGroupModal()" class="text-2xl text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<!-- Add Group Modal -->
<div id="addGroupModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 max-w-lg w-full">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold">➕ Yangi guruh qo'shish</h3>
            <button onclick="closeAddGroupModal()" class="text-2xl text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Guruh nomi</label>
                <input type="text" id="newGroupName" placeholder="Masalan: AT-101-20" class="w-full p-3 border rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Fakultet</label>
                <input type="text" id="newGroupFaculty" placeholder="Axborot texnologiyalari" class="w-full p-3 border rounded-xl">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Kurs</label>
                    <select id="newGroupCourse" class="w-full p-3 border rounded-xl">
                        <option value="1">1-kurs</option>
                        <option value="2">2-kurs</option>
                        <option value="3">3-kurs</option>
                        <option value="4">4-kurs</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Talabalar soni</label>
                    <input type="number" id="newGroupStudents" value="0" class="w-full p-3 border rounded-xl">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Fan</label>
                <input type="text" id="newGroupSubject" placeholder="Veb dasturlash" class="w-full p-3 border rounded-xl">
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="addGroup()" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700">
                    <i class="fas fa-save mr-2"></i> Saqlash
                </button>
                <button onclick="closeAddGroupModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                    Bekor qilish
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-xl text-white font-medium shadow-2xl hidden animate-slideIn z-50"></div>

<script>
    // ========== MA'LUMOTLAR ==========
    let groupsData = [
        {
            id: 1,
            name: 'AT-101-20',
            faculty: 'Axborot texnologiyalari',
            course: 2,
            students: 24,
            subject: 'Veb dasturlash',
            status: 'active',
            teacher: 'Said Alisherov',
            averageGrade: 4.7,
            attendance: 95,
            schedule: {
                monday: '09:00-10:20 • 402-xona',
                wednesday: '11:00-12:30 • 408-xona',
                friday: '13:00-14:20 • 402-xona'
            },
            studentsList: [
                { id: 7, name: 'Azimjon Karimov', email: 'a.karimov@student.uz', avgGrade: 4.8, attendance: 95 },
                { id: 8, name: 'Ali Valiyev', email: 'a.valiyev@student.uz', avgGrade: 4.9, attendance: 98 },
                { id: 9, name: 'Dilya Akramova', email: 'd.akramova@student.uz', avgGrade: 4.6, attendance: 92 }
            ],
            tasks: [
                { title: 'HTML portfolio', deadline: '2025-03-25', submitted: 18, total: 24 },
                { title: 'CSS animatsiyalar', deadline: '2025-03-15', submitted: 22, total: 24 },
                { title: 'JavaScript masalalari', deadline: '2025-03-30', submitted: 10, total: 24 }
            ]
        },
        {
            id: 2,
            name: 'AT-102-20',
            faculty: 'Axborot texnologiyalari',
            course: 2,
            students: 26,
            subject: 'Ma\'lumotlar bazasi',
            status: 'active',
            teacher: 'Nodira Karimova',
            averageGrade: 4.5,
            attendance: 92,
            schedule: {
                tuesday: '09:00-10:20 • 312-xona',
                thursday: '11:00-12:30 • 315-xona'
            },
            studentsList: [
                { id: 10, name: 'Jasur Karimov', email: 'j.karimov@student.uz', avgGrade: 4.4, attendance: 90 },
                { id: 15, name: 'Shoxrux Aliyev', email: 'sh.aliyev@student.uz', avgGrade: 4.2, attendance: 88 },
                { id: 16, name: 'Nilufar Rahimova', email: 'n.rahimova@student.uz', avgGrade: 4.7, attendance: 96 }
            ],
            tasks: [
                { title: 'ER diagramma', deadline: '2025-03-28', submitted: 15, total: 26 },
                { title: 'SQL so\'rovlari', deadline: '2025-03-20', submitted: 20, total: 26 }
            ]
        },
        {
            id: 3,
            name: 'KI-201-21',
            faculty: 'Kompyuter injiniringi',
            course: 3,
            students: 22,
            subject: 'Kiberxavfsizlik',
            status: 'active',
            teacher: 'Jasur Usmonov',
            averageGrade: 4.3,
            attendance: 88,
            schedule: {
                wednesday: '14:00-15:30 • 210-xona',
                friday: '09:00-10:20 • 210-xona'
            },
            studentsList: [
                { id: 11, name: 'Malika Ismoilova', email: 'm.ismoilova@student.uz', avgGrade: 4.9, attendance: 96 },
                { id: 12, name: 'Sardor Abdurahmonov', email: 's.abdurahmonov@student.uz', avgGrade: 4.5, attendance: 92 }
            ],
            tasks: [
                { title: 'Xavfsizlik hisoboti', deadline: '2025-03-30', submitted: 12, total: 22 },
                { title: 'Penetration testing', deadline: '2025-04-05', submitted: 5, total: 22 }
            ]
        }
    ];

    let currentFilter = { search: '', course: 'all', status: 'all' };

    // ========== SAHIFA YUKLANGANDA ==========
    window.onload = function() {
        loadGroups();
        updateStatistics();
    };

    function loadGroups() {
        const container = document.getElementById('groupsGrid');
        let filteredGroups = [...groupsData];
        
        // Apply search
        if (currentFilter.search) {
            filteredGroups = filteredGroups.filter(g => 
                g.name.toLowerCase().includes(currentFilter.search.toLowerCase())
            );
        }
        
        // Apply course filter
        if (currentFilter.course !== 'all') {
            filteredGroups = filteredGroups.filter(g => g.course === parseInt(currentFilter.course));
        }
        
        // Apply status filter
        if (currentFilter.status !== 'all') {
            filteredGroups = filteredGroups.filter(g => g.status === currentFilter.status);
        }
        
        container.innerHTML = '';
        
        if (filteredGroups.length === 0) {
            container.innerHTML = `
                <div class="col-span-3 text-center py-12">
                    <i class="fas fa-search text-5xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">Guruhlar topilmadi</p>
                </div>
            `;
            return;
        }
        
        filteredGroups.forEach(group => {
            const statusColor = group.status === 'active' ? 'text-green-600 bg-green-100' : 'text-gray-600 bg-gray-100';
            const statusText = group.status === 'active' ? 'Faol' : 'Arxiv';
            
            container.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm p-6 card-hover" onclick="showGroupDetails(${group.id})">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                            ${group.name.split('-')[0]}
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${statusText}</span>
                    </div>
                    
                    <h3 class="font-bold text-xl">${group.name}</h3>
                    <p class="text-sm text-gray-500">${group.faculty}</p>
                    <p class="text-sm text-gray-600 mt-1">Fan: ${group.subject}</p>
                    
                    <div class="grid grid-cols-2 gap-3 mt-4 pt-4 border-t">
                        <div>
                            <p class="text-xs text-gray-500">Talabalar</p>
                            <p class="text-xl font-bold">${group.students}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500">O'rtacha baho</p>
                            <p class="text-xl font-bold ${group.averageGrade >= 4.5 ? 'text-green-600' : group.averageGrade >= 3.5 ? 'text-yellow-600' : 'text-red-600'}">${group.averageGrade}</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 mt-4">
                        <button onclick="event.stopPropagation(); showGroupStudents(${group.id})" class="flex-1 py-2 bg-blue-50 text-blue-600 rounded-xl text-sm hover:bg-blue-100">
                            <i class="fas fa-users mr-1"></i> Talabalar
                        </button>
                        <button onclick="event.stopPropagation(); showGroupJournal(${group.id})" class="flex-1 py-2 bg-green-50 text-green-600 rounded-xl text-sm hover:bg-green-100">
                            <i class="fas fa-book-open mr-1"></i> Jurnal
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function showGroupDetails(groupId) {
        const group = groupsData.find(g => g.id === groupId);
        if (!group) return;
        
        const modalContent = `
            <div class="space-y-6">
                <!-- Header -->
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-6 rounded-2xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-2xl font-bold">${group.name}</h4>
                            <p class="text-blue-100 mt-1">${group.faculty}</p>
                            <p class="text-blue-100">${group.course}-kurs • ${group.students} talaba</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm">O'rtacha baho</p>
                            <p class="text-3xl font-bold">${group.averageGrade}</p>
                        </div>
                    </div>
                </div>
                
                <!-- Statistics -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-blue-600">${group.attendance}%</p>
                        <p class="text-sm text-gray-500">Davomat</p>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-green-600">${group.students}</p>
                        <p class="text-sm text-gray-500">Talabalar</p>
                    </div>
                </div>
                
                <!-- Schedule -->
                <div>
                    <h5 class="font-bold text-lg mb-3">📅 Dars jadvali</h5>
                    <div class="space-y-2">
                        ${Object.entries(group.schedule).map(([day, time]) => `
                            <div class="bg-gray-50 p-3 rounded-xl flex justify-between">
                                <span class="font-medium">${day.charAt(0).toUpperCase() + day.slice(1)}</span>
                                <span class="text-gray-600">${time}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- Tasks -->
                <div>
                    <h5 class="font-bold text-lg mb-3">📋 Vazifalar</h5>
                    <div class="space-y-3">
                        ${group.tasks.map(task => {
                            const percent = Math.round((task.submitted / task.total) * 100);
                            return `
                                <div class="border rounded-xl p-3">
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="font-medium">${task.title}</p>
                                        <span class="text-xs ${task.deadline < new Date().toISOString().split('T')[0] ? 'text-red-600' : 'text-orange-600'}">Muddat: ${task.deadline}</span>
                                    </div>
                                    <div class="flex justify-between text-sm mb-1">
                                        <span>Topshirganlar: ${task.submitted}/${task.total}</span>
                                        <span>${percent}%</span>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${percent}%"></div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button onclick="showGroupStudents(${group.id})" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700">
                        <i class="fas fa-users mr-2"></i> Talabalar ro'yxati
                    </button>
                    <button onclick="editGroup(${group.id})" class="flex-1 bg-yellow-600 text-white p-3 rounded-xl font-bold hover:bg-yellow-700">
                        <i class="fas fa-edit mr-2"></i> Tahrirlash
                    </button>
                    <button onclick="closeGroupModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                        Yopish
                    </button>
                </div>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = modalContent;
        document.getElementById('groupModal').style.display = 'flex';
    }

    function showGroupStudents(groupId) {
        const group = groupsData.find(g => g.id === groupId);
        if (!group) return;
        
        let studentsHtml = `
            <div class="space-y-4">
                <h4 class="text-xl font-bold">${group.name} - Talabalar ro'yxati</h4>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-3 text-left">Talaba</th>
                                <th class="p-3 text-left">Email</th>
                                <th class="p-3 text-center">O'rtacha</th>
                                <th class="p-3 text-center">Davomat</th>
                                <th class="p-3 text-center"></th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        group.studentsList.forEach(student => {
            studentsHtml += `
                <tr class="border-t hover:bg-gray-50">
                    <td class="p-3">
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=${student.name.split(' ').join('+')}&background=3b82f6&color=fff" class="student-avatar">
                            <span class="font-medium">${student.name}</span>
                        </div>
                    </td>
                    <td class="p-3">${student.email}</td>
                    <td class="p-3 text-center font-bold ${student.avgGrade >= 4.5 ? 'text-green-600' : student.avgGrade >= 3.5 ? 'text-yellow-600' : 'text-red-600'}">${student.avgGrade}</td>
                    <td class="p-3 text-center font-bold ${student.attendance >= 90 ? 'text-green-600' : student.attendance >= 75 ? 'text-yellow-600' : 'text-red-600'}">${student.attendance}%</td>
                    <td class="p-3 text-center">
                        <button onclick="viewStudentGrades(${student.id})" class="text-blue-600 hover:text-blue-800">
                            <i class="fas fa-chart-line"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        studentsHtml += `
                        </tbody>
                    </table>
                </div>
                <button onclick="closeGroupModal()" class="w-full bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300 mt-4">
                    Yopish
                </button>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = studentsHtml;
        document.getElementById('groupModal').style.display = 'flex';
    }

    function showGroupJournal(groupId) {
        const group = groupsData.find(g => g.id === groupId);
        if (!group) return;
        
        let journalHtml = `
            <div class="space-y-4">
                <h4 class="text-xl font-bold">${group.name} - Jurnal</h4>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-3 text-left">Talaba</th>
                                <th class="p-3 text-center">1</th>
                                <th class="p-3 text-center">2</th>
                                <th class="p-3 text-center">3</th>
                                <th class="p-3 text-center">4</th>
                                <th class="p-3 text-center">O'rtacha</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        group.studentsList.forEach(student => {
            const grades = [5, 4, 5, 4];
            const avg = grades.reduce((a, b) => a + b, 0) / grades.length;
            
            journalHtml += `
                <tr class="border-t hover:bg-gray-50">
                    <td class="p-3 font-medium">${student.name}</td>
                    ${grades.map(g => `
                        <td class="p-3 text-center">
                            <span class="inline-block w-8 h-8 rounded-lg ${g >= 4.5 ? 'bg-green-100 text-green-600' : g >= 3.5 ? 'bg-yellow-100 text-yellow-600' : 'bg-red-100 text-red-600'} flex items-center justify-center font-bold">
                                ${g}
                            </span>
                        </td>
                    `).join('')}
                    <td class="p-3 text-center font-bold text-blue-600">${avg.toFixed(1)}</td>
                </tr>
            `;
        });
        
        journalHtml += `
                        </tbody>
                    </table>
                </div>
                <div class="flex gap-3">
                    <button onclick="exportJournal(${groupId})" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700">
                        <i class="fas fa-download mr-2"></i> Yuklab olish
                    </button>
                    <button onclick="closeGroupModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                        Yopish
                    </button>
                </div>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = journalHtml;
        document.getElementById('groupModal').style.display = 'flex';
    }

    function editGroup(groupId) {
        const group = groupsData.find(g => g.id === groupId);
        if (!group) return;
        
        showAddGroupModal();
        document.getElementById('newGroupName').value = group.name;
        document.getElementById('newGroupFaculty').value = group.faculty;
        document.getElementById('newGroupCourse').value = group.course;
        document.getElementById('newGroupStudents').value = group.students;
        document.getElementById('newGroupSubject').value = group.subject;
    }

    function updateStatistics() {
        const totalGroups = groupsData.length;
        const totalStudents = groupsData.reduce((sum, g) => sum + g.students, 0);
        const avgAttendance = (groupsData.reduce((sum, g) => sum + g.attendance, 0) / totalGroups).toFixed(1);
        const avgGrade = (groupsData.reduce((sum, g) => sum + parseFloat(g.averageGrade), 0) / totalGroups).toFixed(1);
        
        document.getElementById('totalGroups').textContent = totalGroups;
        document.getElementById('totalStudents').textContent = totalStudents;
        document.getElementById('avgAttendance').textContent = `${avgAttendance}%`;
        document.getElementById('avgGrade').textContent = avgGrade;
    }

    // ========== FILTER FUNKSIYALARI ==========
    function searchGroups() {
        currentFilter.search = document.getElementById('searchInput').value;
        loadGroups();
    }
    
    function filterGroups() {
        currentFilter.course = document.getElementById('courseFilter').value;
        currentFilter.status = document.getElementById('statusFilter').value;
        loadGroups();
    }

    // ========== GROUP CRUD ==========
    function showAddGroupModal() {
        document.getElementById('addGroupModal').style.display = 'flex';
        document.getElementById('newGroupName').value = '';
        document.getElementById('newGroupFaculty').value = '';
        document.getElementById('newGroupCourse').value = '1';
        document.getElementById('newGroupStudents').value = '0';
        document.getElementById('newGroupSubject').value = '';
    }
    
    function closeAddGroupModal() {
        document.getElementById('addGroupModal').style.display = 'none';
    }
    
    function addGroup() {
        const name = document.getElementById('newGroupName').value;
        const faculty = document.getElementById('newGroupFaculty').value;
        const course = document.getElementById('newGroupCourse').value;
        const students = document.getElementById('newGroupStudents').value;
        const subject = document.getElementById('newGroupSubject').value;
        
        if (!name || !faculty || !subject) {
            showToast('Barcha maydonlarni to\'ldiring!', 'error');
            return;
        }
        
        const newGroup = {
            id: groupsData.length + 1,
            name: name,
            faculty: faculty,
            course: parseInt(course),
            students: parseInt(students),
            subject: subject,
            status: 'active',
            teacher: 'Said Alisherov',
            averageGrade: 0,
            attendance: 0,
            schedule: {},
            studentsList: [],
            tasks: []
        };
        
        groupsData.push(newGroup);
        loadGroups();
        updateStatistics();
        closeAddGroupModal();
        showToast('Guruh muvaffaqiyatli qo\'shildi!', 'success');
    }

    function exportJournal(groupId) {
        showToast('Jurnal eksport qilinmoqda...', 'info');
        setTimeout(() => {
            showToast('Jurnal muvaffaqiyatli yuklab olindi!', 'success');
        }, 2000);
    }

    function viewStudentGrades(studentId) {
        showToast('Talaba baholari', 'info');
    }

    function closeGroupModal() {
        document.getElementById('groupModal').style.display = 'none';
    }

    // ========== NAVIGATSIYA ==========
    function goToDashboard() {
        window.location.href = 'dashboard.html';
    }

    function goToProfile() {
        window.location.href = '../shared/profile.html?role=teacher';
    }

    function logout() {
        if (confirm('Tizimdan chiqmoqchimisiz?')) {
            window.location.href = '../../index.html';
        }
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add(type === 'success' ? 'bg-green-500' : 
                          type === 'error' ? 'bg-red-500' : 
                          type === 'warning' ? 'bg-orange-500' : 'bg-blue-500');
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-orange-500', 'bg-blue-500');
        }, 3000);
    }

    window.onclick = function(event) {
        const groupModal = document.getElementById('groupModal');
        const addGroupModal = document.getElementById('addGroupModal');
        if (event.target === groupModal) closeGroupModal();
        if (event.target === addGroupModal) closeAddGroupModal();
    }
</script>

</body>
