<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - EduHemis</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-900 to-purple-900">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl animate-fadeIn">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-green-600 to-teal-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">EduHemis</h1>
                <p class="text-gray-500">Yangi hisob yaratish</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="text-sm font-medium ml-2">To'liq ism</label>
                    <input type="text" id="fullName" class="w-full p-3 border rounded-xl mt-1">
                </div>
                <div>
                    <label class="text-sm font-medium ml-2">Email</label>
                    <input type="email" id="email" class="w-full p-3 border rounded-xl mt-1">
                </div>
                <div>
                    <label class="text-sm font-medium ml-2">Rol</label>
                    <select id="role" class="w-full p-3 border rounded-xl mt-1">
                        <option value="student">Talaba</option>
                        <option value="teacher">O'qituvchi</option>
                    </select>
                </div>
                <div id="studentField">
                    <label class="text-sm font-medium ml-2">Guruh</label>
                    <input type="text" id="group" placeholder="Masalan: AT-101-20" class="w-full p-3 border rounded-xl mt-1">
                </div>
                <div id="teacherField" class="hidden">
                    <label class="text-sm font-medium ml-2">Fan</label>
                    <input type="text" id="subject" placeholder="Masalan: Veb dasturlash" class="w-full p-3 border rounded-xl mt-1">
                </div>
                <div>
                    <label class="text-sm font-medium ml-2">Login</label>
                    <input type="text" id="username" class="w-full p-3 border rounded-xl mt-1">
                </div>
                <div>
                    <label class="text-sm font-medium ml-2">Parol</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-xl mt-1">
                </div>
                <div>
                    <label class="text-sm font-medium ml-2">Parolni takrorlang</label>
                    <input type="password" id="confirmPassword" class="w-full p-3 border rounded-xl mt-1">
                </div>
                
                <div id="errorMessage" class="text-red-500 text-sm hidden text-center"></div>
                
                <button type="submit" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700 transition-all">
                    <i class="fas fa-user-plus mr-2"></i> Ro'yxatdan o'tish
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                Hisobingiz bormi? 
                <a href="login.html" class="text-blue-600 font-bold hover:underline">Kirish</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('role').addEventListener('change', function() {
            if (this.value === 'student') {
                document.getElementById('studentField').classList.remove('hidden');
                document.getElementById('teacherField').classList.add('hidden');
            } else {
                document.getElementById('studentField').classList.add('hidden');
                document.getElementById('teacherField').classList.remove('hidden');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Ro'yxatdan o'tish logikasi
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
