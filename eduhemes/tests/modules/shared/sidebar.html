<!-- Mobile Sidebar Toggle Button -->
<div class="md:hidden fixed bottom-6 left-6 z-50">
    <button onclick="toggleSidebar()" class="w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-blue-700 transition-all">
        <i class="fas fa-bars"></i>
    </button>
</div>

<!-- Mobile Sidebar Overlay -->
<div id="mobileSidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" onclick="toggleSidebar()">
    <div class="absolute left-0 top-0 w-80 h-full bg-white shadow-xl overflow-y-auto" onclick="event.stopPropagation()">
        <div class="p-4 border-b flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="font-bold text-lg">EduHemis</span>
            </div>
            <button onclick="toggleSidebar()" class="text-2xl text-gray-500">&times;</button>
        </div>
        <div id="mobileSidebarContent">
            <!-- Mobile sidebar content will be cloned from desktop sidebar -->
        </div>
    </div>
</div>

<script>
    // ========== SIDEBAR FUNKSIYALARI ==========
    
    // Foydalanuvchi ma'lumotlarini yangilash
    function updateSidebarUser(user) {
        document.getElementById('sidebarName').textContent = user.name;
        document.getElementById('sidebarRole').textContent = 
            user.role === 'student' ? 'Talaba' : 
            user.role === 'teacher' ? "O'qituvchi" : 'Administrator';
        
        if (user.group) {
            document.getElementById('sidebarGroup').textContent = user.group + ' guruhi';
        } else if (user.subject) {
            document.getElementById('sidebarGroup').textContent = user.subject + ' fani';
        } else {
            document.getElementById('sidebarGroup').textContent = 'Tizim boshqaruvi';
        }
        
        const colors = {
            student: '0284c7',
            teacher: '4f46e5',
            admin: 'dc2626'
        };
        document.getElementById('sidebarAvatar').src = `https://ui-avatars.com/api/?name=${user.name.split(' ').join('+')}&background=${colors[user.role]}&color=fff`;
        
        // Oxirgi kirish vaqtini yangilash
        const lastLogin = localStorage.getItem('lastLogin');
        if (lastLogin) {
            document.getElementById('lastLogin').textContent = formatDate(new Date(lastLogin));
        }
    }
    
    // Sanani formatlash
    function formatDate(date) {
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${day}.${month}.${year}`;
    }
    
    // Profilga o'tish
    function goToProfile() {
        window.location.href = 'profile.html';
    }
    
    // Chiqish
    function logout() {
        if (confirm('Tizimdan chiqmoqchimisiz?')) {
            localStorage.removeItem('currentUser');
            window.location.href = '../../index.html';
        }
    }
    
    // Mobil menyuni ochish/yopish
    function toggleSidebar() {
        const overlay = document.getElementById('mobileSidebarOverlay');
        overlay.classList.toggle('hidden');
        
        // Desktop sidebardan mobil sidebarga kontentni ko'chirish
        if (!overlay.classList.contains('hidden')) {
            const desktopSidebar = document.querySelector('.w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky');
            const mobileContent = document.getElementById('mobileSidebarContent');
            if (desktopSidebar && mobileContent) {
                mobileContent.innerHTML = desktopSidebar.innerHTML;
            }
        }
    }
    
    // Aktiv menyu elementini belgilash
    function setActiveMenuItem() {
        const currentPath = window.location.pathname.split('/').pop();
        const menuLinks = document.querySelectorAll('.sidebar-menu a');
        
        menuLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath) {
                link.classList.add('bg-blue-50', 'text-blue-600');
                link.querySelector('i').classList.add('text-blue-600');
            }
        });
    }
    
    // Scroll bo'yicha sidebarni boshqarish
    window.addEventListener('scroll', function() {
        const sidebar = document.querySelector('.w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky');
        if (sidebar) {
            const scrollTop = window.scrollY;
            if (scrollTop > 100) {
                sidebar.style.top = '80px';
            } else {
                sidebar.style.top = '100px';
            }
        }
    });
    
    // Sahifa yuklanganda
    document.addEventListener('DOMContentLoaded', function() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            updateSidebarUser(user);
        }
        setActiveMenuItem();
    });
</script>

<style>
    /* Sidebar scrollbar */
    .w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky {
        max-height: calc(100vh - 120px);
        overflow-y: auto;
        scrollbar-width: thin;
    }
    
    .w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky::-webkit-scrollbar {
        width: 5px;
    }
    
    .w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
    }
    
    .w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }
    
    .w-72.bg-white.rounded-3xl.shadow-sm.p-5.sticky::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
    }
    
    /* Animatsiyalar */
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    .animate-pulse {
        animation: pulse 2s infinite;
    }
</style>
