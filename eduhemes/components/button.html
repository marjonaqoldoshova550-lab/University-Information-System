<style>
    /* ===== BUTTON STYLES ===== */
    
    /* Primary */
    .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
    }
    
    .btn-primary:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
    }
    
    .btn-primary:active {
        transform: scale(0.98);
    }
    
    /* Secondary */
    .btn-secondary {
        background: linear-gradient(135deg, #6b7280, #4b5563);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(107, 114, 128, 0.3);
    }
    
    .btn-secondary:hover {
        background: linear-gradient(135deg, #4b5563, #374151);
        box-shadow: 0 10px 15px -3px rgba(107, 114, 128, 0.4);
    }
    
    /* Success */
    .btn-success {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);
    }
    
    .btn-success:hover {
        background: linear-gradient(135deg, #059669, #047857);
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
    }
    
    /* Danger */
    .btn-danger {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3);
    }
    
    .btn-danger:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
        box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4);
    }
    
    /* Warning */
    .btn-warning {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.3);
    }
    
    .btn-warning:hover {
        background: linear-gradient(135deg, #d97706, #b45309);
        box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
    }
    
    /* Info */
    .btn-info {
        background: linear-gradient(135deg, #06b6d4, #0891b2);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(6, 182, 212, 0.3);
    }
    
    .btn-info:hover {
        background: linear-gradient(135deg, #0891b2, #0e7490);
        box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.4);
    }
    
    /* Light */
    .btn-light {
        background: linear-gradient(135deg, #f9fafb, #f3f4f6);
        color: #1f2937;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .btn-light:hover {
        background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    /* Dark */
    .btn-dark {
        background: linear-gradient(135deg, #1f2937, #111827);
        color: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
    
    .btn-dark:hover {
        background: linear-gradient(135deg, #111827, #030712);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
    }
    
    /* Outline buttons */
    .btn-outline {
        background: transparent;
        border: 2px solid;
        transition: all 0.3s;
    }
    
    .btn-outline-primary {
        border-color: #3b82f6;
        color: #3b82f6;
    }
    
    .btn-outline-primary:hover {
        background: #3b82f6;
        color: white;
    }
    
    .btn-outline-success {
        border-color: #10b981;
        color: #10b981;
    }
    
    .btn-outline-success:hover {
        background: #10b981;
        color: white;
    }
    
    .btn-outline-danger {
        border-color: #ef4444;
        color: #ef4444;
    }
    
    .btn-outline-danger:hover {
        background: #ef4444;
        color: white;
    }
    
    /* Button sizes */
    .btn-xs { font-size: 0.75rem; padding: 0.25rem 0.75rem; }
    .btn-sm { font-size: 0.875rem; padding: 0.5rem 1rem; }
    .btn-lg { font-size: 1.125rem; padding: 0.75rem 1.5rem; }
    .btn-xl { font-size: 1.25rem; padding: 1rem 2rem; }
    
    /* Disabled button */
    .btn-disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
    }
    
    /* Focus ring */
    .btn:focus, .btn-outline:focus, .btn-icon:focus, .btn-social:focus {
        outline: none;
        ring: 2px solid #3b82f6;
        ring-offset: 2px;
    }
</style>

<script>
    // ===== BUTTON FUNKSIYALARI =====
    
    // Loading button
    function showLoading(buttonId) {
        const btn = document.getElementById(buttonId);
        if (btn) {
            const textSpan = btn.querySelector('.btn-text');
            const loaderSpan = btn.querySelector('.btn-loader');
            if (textSpan && loaderSpan) {
                textSpan.classList.add('invisible');
                loaderSpan.classList.remove('hidden');
                btn.disabled = true;
            }
        }
    }
    
    function hideLoading(buttonId) {
        const btn = document.getElementById(buttonId);
        if (btn) {
            const textSpan = btn.querySelector('.btn-text');
            const loaderSpan = btn.querySelector('.btn-loader');
            if (textSpan && loaderSpan) {
                textSpan.classList.remove('invisible');
                loaderSpan.classList.add('hidden');
                btn.disabled = false;
            }
        }
    }
    
    // Dropdown toggle
    function toggleDropdown() {
        const dropdown = document.getElementById('dropdownMenu');
        if (dropdown) {
            dropdown.classList.toggle('hidden');
        }
    }
    
    // Dropdownni tashqariga bosganda yopish
    document.addEventListener('click', function(event) {
        const dropdown = document.getElementById('dropdownMenu');
        const btn = event.target.closest('.btn-primary');
        if (dropdown && !btn && !dropdown.contains(event.target)) {
            dropdown.classList.add('hidden');
        }
    });
    
    // Ripple effect
    function createRipple(event) {
        const button = event.currentTarget;
        const ripple = document.createElement('span');
        const rect = button.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = event.clientX - rect.left - size / 2;
        const y = event.clientY - rect.top - size / 2;
        
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        ripple.className = 'ripple';
        
        button.appendChild(ripple);
        
        setTimeout(() => {
            ripple.remove();
        }, 600);
    }
    
    // Ripple effekti uchun stillar
    const rippleStyle = document.createElement('style');
    rippleStyle.textContent = `
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }
        
        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        .btn, .btn-outline, .btn-icon, .btn-social {
            position: relative;
            overflow: hidden;
        }
    `;
    document.head.appendChild(rippleStyle);
    
    // Barcha tugmalarga ripple effekti qo'shish
    document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.btn, .btn-outline, .btn-icon, .btn-social');
        buttons.forEach(btn => {
            btn.addEventListener('click', createRipple);
        });
    });
</script>
