<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davomat - EduHemis</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .animate-fadeIn { animation: fadeIn 0.5s ease; }
        .animate-slideIn { animation: slideIn 0.3s ease; }
        
        .card-hover {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .tab-btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-active {
            background: #3b82f6;
            color: white;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .student-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            transition: all 0.3s;
        }
        
        .student-item:hover {
            background: #f9fafb;
        }
        
        .attendance-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .attendance-btn:hover {
            transform: scale(1.1);
        }
        
        .status-present {
            background: #10b981;
            color: white;
        }
        
        .status-late {
            background: #f59e0b;
            color: white;
        }
        
        .status-absent {
            background: #ef4444;
            color: white;
        }
        
        .status-excused {
            background: #8b5cf6;
            color: white;
        }
        
        .calendar-day {
            min-height: 100px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .calendar-day:hover {
            background: #eff6ff;
            border-color: #3b82f6;
        }
        
        .calendar-day.today {
            background: #dbeafe;
            border: 2px solid #3b82f6;
        }
        
        .calendar-day.has-attendance {
            background: #dcfce7;
            border-color: #10b981;
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s;
        }
        
        .month-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .month-nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .month-nav-btn:hover {
            background: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-100">

<!-- ========== HEADER ========== -->
<div class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl text-gray-800">EduHemis</h1>
                    <p class="text-xs text-gray-500">Davomat boshqaruvi</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="goToDashboard()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-all flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i>
                    <span class="hidden md:inline">Bosh sahifa</span>
                </button>
                <div class="text-right hidden md:block">
                    <p class="font-bold text-gray-800">Said Alisherov</p>
                    <p class="text-xs text-gray-500">O'qituvchi • Veb dasturlash</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Said+Alisherov&background=4f46e5&color=fff" 
                     class="w-10 h-10 rounded-full border-2 border-purple-600 cursor-pointer" onclick="goToProfile()">
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page Title -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">✅ Davomat</h1>
        <button onclick="exportAttendance()" class="px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-all flex items-center gap-2">
            <i class="fas fa-download"></i>
            <span>Hisobot</span>
        </button>
    </div>

    <!-- Statistics Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByStatus('present')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Davomat</p>
                    <h3 class="text-2xl font-bold mt-1 text-green-600" id="attendanceRate">94%</h3>
                </div>
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-check-circle"></i>
                </div>
            </div>
            <div class="mt-4 progress-bar">
                <div class="progress-fill" style="width: 94%"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByStatus('present')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Keldi</p>
                    <h3 class="text-2xl font-bold mt-1 text-green-600" id="presentCount">156</h3>
                </div>
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-user-check"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByStatus('late')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Kechikdi</p>
                    <h3 class="text-2xl font-bold mt-1 text-orange-600" id="lateCount">12</h3>
                </div>
                <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-clock"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm card-hover" onclick="filterByStatus('absent')">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gray-500 text-sm">Kelmadi</p>
                    <h3 class="text-2xl font-bold mt-1 text-red-600" id="absentCount">8</h3>
                </div>
                <div class="w-12 h-12 bg-red-100 text-red-600 rounded-xl flex items-center justify-center text-xl">
                    <i class="fas fa-user-times"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-white rounded-3xl shadow-sm p-6">
            <h3 class="text-xl font-bold mb-4">📊 Haftalik davomat</h3>
            <canvas id="weeklyChart" height="200"></canvas>
        </div>
        <div class="bg-white rounded-3xl shadow-sm p-6">
            <h3 class="text-xl font-bold mb-4">🥧 Davomat taqsimoti</h3>
            <canvas id="distributionChart" height="200"></canvas>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Talaba ismi bo'yicha qidirish..." onkeyup="filterStudents()">
            </div>
            <select id="groupFilter" class="p-3 border rounded-xl bg-white" onchange="filterStudents()">
                <option value="all">Barcha guruhlar</option>
                <option value="AT-101-20">AT-101-20</option>
                <option value="AT-102-20">AT-102-20</option>
                <option value="KI-201-21">KI-201-21</option>
            </select>
            <select id="statusFilter" class="p-3 border rounded-xl bg-white" onchange="filterStudents()">
                <option value="all">Barcha holatlar</option>
                <option value="present">Keldi</option>
                <option value="late">Kechikdi</option>
                <option value="absent">Kelmadi</option>
                <option value="excused">Uzrli</option>
            </select>
        </div>
    </div>

    <!-- Students List -->
    <div class="bg-white rounded-3xl shadow-sm overflow-hidden mb-8">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4 text-left">Talaba</th>
                        <th class="p-4 text-left">Guruh</th>
                        <th class="p-4 text-center">Holat</th>
                        <th class="p-4 text-center">Keldi</th>
                        <th class="p-4 text-center">Kechikdi</th>
                        <th class="p-4 text-center">Kelmadi</th>
                        <th class="p-4 text-center">Uzrli</th>
                        <th class="p-4 text-center">Davomat %</th>
                        <th class="p-4 text-center"></th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    <!-- Students will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Calendar View -->
    <div class="bg-white rounded-3xl shadow-sm p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">📅 Dars jadvali va davomat</h3>
            <div class="month-nav">
                <button onclick="changeMonth(-1)" class="month-nav-btn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="currentMonth" class="font-medium">Mart 2025</span>
                <button onclick="changeMonth(1)" class="month-nav-btn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        <div class="grid grid-cols-7 gap-2" id="calendar">
            <!-- Calendar will be loaded here -->
        </div>
    </div>

</div>

<!-- Attendance Modal -->
<div id="attendanceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold" id="modalTitle">Davomat olish</h3>
            <button onclick="closeAttendanceModal()" class="text-2xl text-gray-500 hover:text-gray-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-xl text-white font-medium shadow-2xl hidden animate-slideIn z-50"></div>

<script>
    // ========== MA'LUMOTLAR ==========
    let currentMonth = new Date();
    let currentStatusFilter = 'all';
    let currentGroupFilter = 'all';
    let currentSearch = '';
    
    let studentsData = [
        { id: 7, name: 'Azimjon Karimov', group: 'AT-101-20', present: 18, late: 2, absent: 1, excused: 1, total: 22 },
        { id: 8, name: 'Ali Valiyev', group: 'AT-101-20', present: 20, late: 1, absent: 0, excused: 1, total: 22 },
        { id: 9, name: 'Dilya Akramova', group: 'AT-101-20', present: 19, late: 2, absent: 1, excused: 0, total: 22 },
        { id: 10, name: 'Jasur Karimov', group: 'AT-102-20', present: 16, late: 3, absent: 3, excused: 0, total: 22 },
        { id: 11, name: 'Malika Ismoilova', group: 'KI-201-21', present: 21, late: 0, absent: 0, excused: 1, total: 22 },
        { id: 12, name: 'Sardor Abdurahmonov', group: 'KI-201-21', present: 18, late: 2, absent: 2, excused: 0, total: 22 }
    ];
    
    let attendanceData = {
        '2025-03-20': {
            lesson: 'Veb dasturlash',
            group: 'AT-101-20',
            time: '09:00-10:20',
            room: '402',
            students: {
                7: 'present',
                8: 'present',
                9: 'late'
            }
        },
        '2025-03-22': {
            lesson: 'Veb dasturlash',
            group: 'AT-101-20',
            time: '09:00-10:20',
            room: '402',
            students: {
                7: 'present',
                8: 'present',
                9: 'present'
            }
        },
        '2025-03-24': {
            lesson: 'Veb dasturlash',
            group: 'AT-101-20',
            time: '09:00-10:20',
            room: '402',
            students: {
                7: 'absent',
                8: 'present',
                9: 'present'
            }
        }
    };
    
    let weeklyChart = null;
    let distributionChart = null;

    // ========== SAHIFA YUKLANGANDA ==========
    window.onload = function() {
        loadStudents();
        updateStatistics();
        initCharts();
        updateCalendar();
    };

    function loadStudents() {
        const tbody = document.getElementById('studentsTable');
        let filteredStudents = [...studentsData];
        
        // Apply search
        if (currentSearch) {
            filteredStudents = filteredStudents.filter(s => s.name.toLowerCase().includes(currentSearch.toLowerCase()));
        }
        
        // Apply group filter
        if (currentGroupFilter !== 'all') {
            filteredStudents = filteredStudents.filter(s => s.group === currentGroupFilter);
        }
        
        // Apply status filter
        if (currentStatusFilter !== 'all') {
            filteredStudents = filteredStudents.filter(s => {
                const attendanceRate = ((s.present + s.late + s.excused) / s.total) * 100;
                if (currentStatusFilter === 'present') return attendanceRate >= 90;
                if (currentStatusFilter === 'late') return attendanceRate >= 75 && attendanceRate < 90;
                if (currentStatusFilter === 'absent') return attendanceRate < 75;
                if (currentStatusFilter === 'excused') return s.excused > 0;
                return true;
            });
        }
        
        tbody.innerHTML = '';
        
        filteredStudents.forEach(student => {
            const attendanceRate = ((student.present + student.late + student.excused) / student.total) * 100;
            const rateColor = attendanceRate >= 90 ? 'text-green-600' : 
                             attendanceRate >= 75 ? 'text-yellow-600' : 'text-red-600';
            
            tbody.innerHTML += `
                <tr class="border-t hover:bg-gray-50">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=${student.name.split(' ').join('+')}&background=3b82f6&color=fff" class="w-10 h-10 rounded-full">
                            <div>
                                <p class="font-medium">${student.name}</p>
                                <p class="text-xs text-gray-500">ID: S-${student.id}</p>
                            </div>
                        </div>
                    </td>
                    <td class="p-4">${student.group}</td>
                    <td class="p-4 text-center">
                        <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold 
                            ${attendanceRate >= 90 ? 'bg-green-100 text-green-600' : 
                              attendanceRate >= 75 ? 'bg-yellow-100 text-yellow-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas fa-circle text-[6px]"></i>
                            ${attendanceRate >= 90 ? 'A\'lo' : attendanceRate >= 75 ? 'Yaxshi' : 'Qoniqarsiz'}
                        </span>
                    </td>
                    <td class="p-4 text-center font-medium text-green-600">${student.present}</td>
                    <td class="p-4 text-center font-medium text-orange-600">${student.late}</td>
                    <td class="p-4 text-center font-medium text-red-600">${student.absent}</td>
                    <td class="p-4 text-center font-medium text-purple-600">${student.excused}</td>
                    <td class="p-4 text-center">
                        <span class="font-bold ${rateColor}">${attendanceRate.toFixed(1)}%</span>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="showStudentAttendance(${student.id})" class="text-blue-600 hover:text-blue-800">
                            <i class="fas fa-chart-line"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function updateStatistics() {
        let totalPresent = 0, totalLate = 0, totalAbsent = 0, totalExcused = 0, totalLessons = 0;
        
        studentsData.forEach(s => {
            totalPresent += s.present;
            totalLate += s.late;
            totalAbsent += s.absent;
            totalExcused += s.excused;
            totalLessons += s.total;
        });
        
        const totalStudents = studentsData.length;
        const attendanceRate = totalLessons ? ((totalPresent + totalLate + totalExcused) / (totalLessons * totalStudents) * 100).toFixed(1) : 0;
        
        document.getElementById('attendanceRate').textContent = `${attendanceRate}%`;
        document.getElementById('presentCount').textContent = totalPresent;
        document.getElementById('lateCount').textContent = totalLate;
        document.getElementById('absentCount').textContent = totalAbsent;
    }

    function initCharts() {
        const ctx1 = document.getElementById('weeklyChart').getContext('2d');
        weeklyChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma'],
                datasets: [{
                    label: 'Davomat %',
                    data: [94, 92, 96, 90, 93],
                    backgroundColor: '#3b82f6',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
        
        const ctx2 = document.getElementById('distributionChart').getContext('2d');
        distributionChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Keldi', 'Kechikdi', 'Kelmadi', 'Uzrli'],
                datasets: [{
                    data: [156, 12, 8, 4],
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    function updateCalendar() {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const monthNames = ['Yanvar', 'Fevral', 'Mart', 'Aprel', 'May', 'Iyun', 'Iyul', 'Avgust', 'Sentabr', 'Oktabr', 'Noyabr', 'Dekabr'];
        document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;
        
        const days = ['Du', 'Se', 'Ch', 'Pa', 'Ju', 'Sh', 'Ya'];
        let calendarHtml = days.map(day => `<div class="text-center font-bold text-gray-500 py-2">${day}</div>`).join('');
        
        for (let i = 1; i < firstDay; i++) {
            calendarHtml += '<div class="calendar-day opacity-50"></div>';
        }
        
        const today = new Date().toISOString().split('T')[0];
        
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = dateStr === today;
            const hasAttendance = attendanceData[dateStr] ? 'has-attendance' : '';
            
            calendarHtml += `
                <div class="calendar-day ${isToday ? 'today' : ''} ${hasAttendance}" onclick="showDayAttendance('${dateStr}')">
                    <div class="font-medium">${d}</div>
                    ${attendanceData[dateStr] ? `
                        <div class="text-xs mt-1 text-green-600">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        document.getElementById('calendar').innerHTML = calendarHtml;
    }

    function showDayAttendance(dateStr) {
        const data = attendanceData[dateStr];
        if (!data) {
            showToast(`${dateStr} sanada dars yo'q`, 'info');
            return;
        }
        
        const students = Object.entries(data.students).map(([id, status]) => {
            const student = studentsData.find(s => s.id == id);
            const statusText = status === 'present' ? 'Keldi' : status === 'late' ? 'Kechikdi' : status === 'absent' ? 'Kelmadi' : 'Uzrli';
            const statusColor = status === 'present' ? 'text-green-600' : 
                               status === 'late' ? 'text-orange-600' : 'text-red-600';
            
            return `
                <div class="flex items-center justify-between p-3 border-b">
                    <div class="flex items-center gap-3">
                        <img src="https://ui-avatars.com/api/?name=${student.name.split(' ').join('+')}&background=3b82f6&color=fff" class="w-8 h-8 rounded-full">
                        <span class="font-medium">${student.name}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <select id="status-${id}" class="px-3 py-1 border rounded-lg text-sm" onchange="updateAttendance('${dateStr}', ${id}, this.value)">
                            <option value="present" ${status === 'present' ? 'selected' : ''}>✅ Keldi</option>
                            <option value="late" ${status === 'late' ? 'selected' : ''}>🟡 Kechikdi</option>
                            <option value="absent" ${status === 'absent' ? 'selected' : ''}>❌ Kelmadi</option>
                            <option value="excused" ${status === 'excused' ? 'selected' : ''}>📝 Uzrli</option>
                        </select>
                    </div>
                </div>
            `;
        }).join('');
        
        const modalContent = `
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4 rounded-2xl mb-4">
                <h4 class="font-bold">${data.lesson}</h4>
                <p class="text-sm text-blue-100">${data.group} • ${data.time} • ${data.room}-xona</p>
                <p class="text-sm text-blue-100 mt-1">${dateStr}</p>
            </div>
            
            <div class="space-y-2 max-h-96 overflow-y-auto">
                ${students}
            </div>
            
            <div class="flex gap-3 mt-4">
                <button onclick="saveAttendance('${dateStr}')" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700">
                    <i class="fas fa-save mr-2"></i> Saqlash
                </button>
                <button onclick="closeAttendanceModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                    Yopish
                </button>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = modalContent;
        document.getElementById('attendanceModal').style.display = 'flex';
    }

    function updateAttendance(dateStr, studentId, status) {
        if (!attendanceData[dateStr]) return;
        attendanceData[dateStr].students[studentId] = status;
    }

    function saveAttendance(dateStr) {
        const data = attendanceData[dateStr];
        if (!data) return;
        
        for (const [id, status] of Object.entries(data.students)) {
            const student = studentsData.find(s => s.id == id);
            if (student) {
                student.present = 0;
                student.late = 0;
                student.absent = 0;
                student.excused = 0;
            }
        }
        
        for (const [id, status] of Object.entries(data.students)) {
            const student = studentsData.find(s => s.id == id);
            if (student) {
                if (status === 'present') student.present++;
                else if (status === 'late') student.late++;
                else if (status === 'absent') student.absent++;
                else if (status === 'excused') student.excused++;
            }
        }
        
        loadStudents();
        updateStatistics();
        closeAttendanceModal();
        showToast('Davomat muvaffaqiyatli saqlandi!', 'success');
    }

    function showStudentAttendance(studentId) {
        const student = studentsData.find(s => s.id === studentId);
        if (!student) return;
        
        const attendanceRate = ((student.present + student.late + student.excused) / student.total) * 100;
        
        const modalContent = `
            <div class="text-center">
                <img src="https://ui-avatars.com/api/?name=${student.name.split(' ').join('+')}&background=3b82f6&color=fff" class="w-20 h-20 rounded-full mx-auto mb-3">
                <h4 class="text-xl font-bold">${student.name}</h4>
                <p class="text-gray-500">${student.group}</p>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-green-50 p-3 rounded-xl text-center">
                    <p class="text-2xl font-bold text-green-600">${student.present}</p>
                    <p class="text-xs text-gray-500">Keldi</p>
                </div>
                <div class="bg-orange-50 p-3 rounded-xl text-center">
                    <p class="text-2xl font-bold text-orange-600">${student.late}</p>
                    <p class="text-xs text-gray-500">Kechikdi</p>
                </div>
                <div class="bg-red-50 p-3 rounded-xl text-center">
                    <p class="text-2xl font-bold text-red-600">${student.absent}</p>
                    <p class="text-xs text-gray-500">Kelmadi</p>
                </div>
                <div class="bg-purple-50 p-3 rounded-xl text-center">
                    <p class="text-2xl font-bold text-purple-600">${student.excused}</p>
                    <p class="text-xs text-gray-500">Uzrli</p>
                </div>
            </div>
            
            <div class="mt-4 p-4 bg-gray-50 rounded-xl">
                <div class="flex justify-between items-center">
                    <span class="font-medium">Umumiy davomat:</span>
                    <span class="text-2xl font-bold ${attendanceRate >= 90 ? 'text-green-600' : attendanceRate >= 75 ? 'text-yellow-600' : 'text-red-600'}">${attendanceRate.toFixed(1)}%</span>
                </div>
                <div class="mt-2 progress-bar">
                    <div class="progress-fill" style="width: ${attendanceRate}%"></div>
                </div>
                <p class="text-xs text-gray-500 mt-2">Jami darslar: ${student.total}</p>
            </div>
            
            <button onclick="closeAttendanceModal()" class="w-full bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300 mt-4">
                Yopish
            </button>
        `;
        
        document.getElementById('modalContent').innerHTML = modalContent;
        document.getElementById('attendanceModal').style.display = 'flex';
    }

    function filterStudents() {
        currentSearch = document.getElementById('searchInput').value;
        currentGroupFilter = document.getElementById('groupFilter').value;
        currentStatusFilter = document.getElementById('statusFilter').value;
        loadStudents();
    }

    function filterByStatus(status) {
        document.getElementById('statusFilter').value = status;
        filterStudents();
    }

    function changeMonth(delta) {
        currentMonth.setMonth(currentMonth.getMonth() + delta);
        updateCalendar();
    }

    function exportAttendance() {
        let csv = "Talaba,Guruh,Keldi,Kechikdi,Kelmadi,Uzrli,Davomat %\n";
        studentsData.forEach(s => {
            const attendanceRate = ((s.present + s.late + s.excused) / s.total) * 100;
            csv += `${s.name},${s.group},${s.present},${s.late},${s.absent},${s.excused},${attendanceRate.toFixed(1)}%\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        
        showToast('Davomat hisoboti eksport qilindi!', 'success');
    }

    function closeAttendanceModal() {
        document.getElementById('attendanceModal').style.display = 'none';
    }

    // ========== NAVIGATSIYA ==========
    function goToDashboard() {
        window.location.href = 'dashboard.html';
    }
    
    function goToProfile() {
        window.location.href = '../shared/profile.html?role=teacher';
    }
    
    function logout() {
        if (confirm('Tizimdan chiqmoqchimisiz?')) {
            window.location.href = '../../index.html';
        }
    }
    
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add(type === 'success' ? 'bg-green-500' : 
                          type === 'error' ? 'bg-red-500' : 
                          type === 'warning' ? 'bg-orange-500' : 'bg-blue-500');
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-orange-500', 'bg-blue-500');
        }, 3000);
    }
    
    window.onclick = function(event) {
        const modal = document.getElementById('attendanceModal');
        if (event.target === modal) closeAttendanceModal();
    }
</script>
