    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-fadeIn { animation: fadeIn 0.5s ease; }
        .animate-slideIn { animation: slideIn 0.3s ease; }
        .animate-pulse { animation: pulse 2s infinite; }

        .card-hover {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .teacher-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s;
            border: 1px solid #e5e7eb;
            position: relative;
            overflow: hidden;
        }

        .teacher-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .teacher-card:hover::before {
            transform: scaleX(1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-online {
            background: #dcfce7;
            color: #166534;
        }

        .status-busy {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-offline {
            background: #f3f4f6;
            color: #4b5563;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
        }

        .filter-btn:hover:not(.active) {
            background: #f3f4f6;
        }

        .department-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #f3f4f6;
            border-radius: 50px;
            font-size: 12px;
            color: #4b5563;
        }

        .contact-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .contact-btn:hover {
            transform: scale(1.1);
        }

                t.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                t.subject.toLowerCase().includes(searchQuery.toLowerCase()) ||
                t.department.toLowerCase().includes(searchQuery.toLowerCase())
            );
        }
        
        if (currentDepartment !== 'all') {
            filteredTeachers = filteredTeachers.filter(t => t.department === currentDepartment);
        }
        
        if (currentFilter === 'online') {
            filteredTeachers = filteredTeachers.filter(t => t.status === 'online');
        } else if (currentFilter === 'department') {
            filteredTeachers = filteredTeachers.filter(t => t.isHead);
        } else if (currentFilter === 'professor') {
            filteredTeachers = filteredTeachers.filter(t => t.isProfessor);
        } else if (currentFilter === 'phd') {
            filteredTeachers = filteredTeachers.filter(t => t.isPhD);
        }
        
        // Pagination
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedTeachers = filteredTeachers.slice(start, end);
        
        // Update page info
        const totalPages = Math.ceil(filteredTeachers.length / itemsPerPage);
        document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages || 1}`;
        
        // Generate HTML
        grid.innerHTML = '';
        paginatedTeachers.forEach(teacher => {
            const statusClass = teacher.status === 'online' ? 'status-online' :
                               teacher.status === 'busy' ? 'status-busy' : 'status-offline';
            const statusText = teacher.status === 'online' ? 'Online' :
                              teacher.status === 'busy' ? 'Darsda' : 'Offline';
            
            grid.innerHTML += `
                <div class="teacher-card card-hover" onclick="showTeacherDetails(${teacher.id})">
                    <div class="flex items-start gap-4">
                        <img src="${teacher.avatar}" class="w-20 h-20 rounded-2xl border-2 border-blue-100">
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-lg">${teacher.name}</h3>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                            <p class="text-gray-600">${teacher.subject}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="department-tag">${teacher.department}</span>
                                <span class="text-xs text-gray-500"><i class="fas fa-star text-yellow-400 mr-1"></i>${teacher.rating}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-4 pt-4 border-t">
                        <div class="text-sm text-gray-500">
                            <i class="fas fa-briefcase mr-1"></i> ${teacher.experience} yil
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); showContactModal(${teacher.id})" 
                                    class="contact-btn bg-blue-50 text-blue-600 hover:bg-blue-100">
                                <i class="fas fa-envelope"></i>
                            </button>
                            <button onclick="event.stopPropagation(); window.open('https://t.me/${teacher.telegram.substring(1)}', '_blank')" 
                                    class="contact-btn bg-blue-500 text-white hover:bg-blue-600">
                                <i class="fab fa-telegram-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        if (paginatedTeachers.length === 0) {
            grid.innerHTML = `
                <div class="col-span-3 text-center py-12">
                    <i class="fas fa-search text-5xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">Hech narsa topilmadi</p>
                </div>
            `;
        }
    }

    function showTeacherDetails(teacherId) {
        const teacher = teachersData.find(t => t.id === teacherId);
        if (!teacher) return;
        
        const statusClass = teacher.status === 'online' ? 'status-online' :
                           teacher.status === 'busy' ? 'status-busy' : 'status-offline';
        const statusText = teacher.status === 'online' ? 'Online' :
                          teacher.status === 'busy' ? 'Darsda' : 'Offline';
        
        const educationHtml = teacher.education.map(edu => `
            <div class="flex justify-between text-sm border-b pb-2">
                <span>${edu.degree}, ${edu.university}</span>
                <span class="text-gray-500">${edu.year}</span>
            </div>
        `).join('');
        
        const coursesHtml = teacher.courses.map(course => 
            `<span class="inline-block px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs">${course}</span>`
        ).join(' ');
        
        const modalContent = `
            <div class="space-y-6">
                <div class="flex items-center gap-6">
                    <img src="${teacher.avatar}" class="w-24 h-24 rounded-2xl border-4 border-blue-100">
                    <div>
                        <h4 class="text-2xl font-bold">${teacher.name}</h4>
                        <p class="text-gray-600">${teacher.subject}</p>
                        <span class="status-badge ${statusClass} mt-2">${statusText}</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-3 rounded-xl">
                        <p class="text-xs text-gray-500">Ilmiy daraja</p>
                        <p class="font-medium">${teacher.degree}</p>
                    </div>
                    <div class="bg-green-50 p-3 rounded-xl">
                        <p class="text-xs text-gray-500">Unvon</p>
                        <p class="font-medium">${teacher.title}</p>
                    </div>
                    <div class="bg-purple-50 p-3 rounded-xl">
                        <p class="text-xs text-gray-500">Kafedra</p>
                        <p class="font-medium">${teacher.department}</p>
                    </div>
                    <div class="bg-orange-50 p-3 rounded-xl">
                        <p class="text-xs text-gray-500">Tajriba</p>
                        <p class="font-medium">${teacher.experience} yil</p>
                    </div>
                </div>
                
                <div class="border-t pt-4">
                    <h5 class="font-bold mb-2">📚 Ta'lim</h5>
                    <div class="space-y-2">
                        ${educationHtml}
                    </div>
                </div>
                
                <div class="border-t pt-4">
                    <h5 class="font-bold mb-2">📖 Fanlar</h5>
                    <div class="flex flex-wrap gap-2">
                        ${coursesHtml}
                    </div>
                </div>
                
                <div class="border-t pt-4">
                    <h5 class="font-bold mb-2">📊 Statistika</h5>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="text-center">
                            <p class="text-xl font-bold text-blue-600">${teacher.publications}</p>
                            <p class="text-xs text-gray-500">Maqolalar</p>
                        </div>
                        <div class="text-center">
                            <p class="text-xl font-bold text-green-600">${teacher.students}</p>
                            <p class="text-xs text-gray-500">Talabalar</p>
                        </div>
                        <div class="text-center">
                            <p class="text-xl font-bold text-yellow-600">${teacher.rating}</p>
                            <p class="text-xs text-gray-500">Reyting</p>
                        </div>
                    </div>
                </div>
                
                <div class="border-t pt-4">
                    <h5 class="font-bold mb-2">📞 Kontakt</h5>
                    <div class="space-y-2">
                        <p><i class="fas fa-map-marker-alt w-6 text-gray-400"></i> ${teacher.room}-xona, ${teacher.building} bino</p>
                        <p><i class="fas fa-phone w-6 text-gray-400"></i> ${teacher.phone}</p>
                        <p><i class="fas fa-envelope w-6 text-gray-400"></i> ${teacher.email}</p>
                        <p><i class="fab fa-telegram w-6 text-gray-400"></i> ${teacher.telegram}</p>
                    </div>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button onclick="showContactModal(${teacher.id})" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700">
                        <i class="fas fa-envelope mr-2"></i> Xabar yozish
                    </button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300">
                        Yopish
                    </button>
                </div>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = modalContent;
        document.getElementById('teacherModal').style.display = 'flex';
    }

    function showContactModal(teacherId) {
        const teacher = teachersData.find(t => t.id === teacherId);
        if (!teacher) return;
        
        selectedTeacherId = teacherId;
        document.getElementById('receiverName').value = teacher.name;
        document.getElementById('contactModal').style.display = 'flex';
        closeModal();
    }

    function closeContactModal() {
        document.getElementById('contactModal').style.display = 'none';
        document.getElementById('messageSubject').value = '';
        document.getElementById('messageContent').value = '';
    }

    function sendMessage() {
        const subject = document.getElementById('messageSubject').value;
        const content = document.getElementById('messageContent').value;
        
        if (!subject || !content) {
            showToast('Mavzu va xabarni kiriting!', 'error');
            return;
        }
        
        showToast('Xabar muvaffaqiyatli yuborildi!', 'success');
        closeContactModal();
    }

    // ========== FILTER FUNKSIYALARI ==========
    function searchTeachers() {
        searchQuery = document.getElementById('searchInput').value;
        currentPage = 1;
        displayTeachers();
    }

    function filterTeachers() {
        currentDepartment = document.getElementById('departmentFilter').value;
        currentPage = 1;
        displayTeachers();
    }

    function quickFilter(filter) {
        currentFilter = filter;
        currentPage = 1;
        
        // Update active button
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById(`filter${filter.charAt(0).toUpperCase() + filter.slice(1)}`).classList.add('active');
        
        displayTeachers();
    }

    function changePage(direction) {
        const filteredCount = getFilteredCount();
        const totalPages = Math.ceil(filteredCount / itemsPerPage);
        
        currentPage += direction;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;
        
        displayTeachers();
    }

    function getFilteredCount() {
        let filtered = [...teachersData];
        
        if (searchQuery) {
            filtered = filtered.filter(t => 
                t.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                t.subject.toLowerCase().includes(searchQuery.toLowerCase())
            );
        }
        
        if (currentDepartment !== 'all') {
            filtered = filtered.filter(t => t.department === currentDepartment);
        }
        
        if (currentFilter === 'online') {
            filtered = filtered.filter(t => t.status === 'online');
        } else if (currentFilter === 'department') {
            filtered = filtered.filter(t => t.isHead);
        } else if (currentFilter === 'professor') {
            filtered = filtered.filter(t => t.isProfessor);
        } else if (currentFilter === 'phd') {
            filtered = filtered.filter(t => t.isPhD);
        }
        
        return filtered.length;
    }

    function closeModal() {
        document.getElementById('teacherModal').style.display = 'none';
    }

    function goToDashboard() {
        window.location.href = 'dashboard.html';
    }

    function goToProfile() {
        window.location.href = 'profile.html';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        
        if (type === 'success') toast.classList.add('bg-green-500');
        else if (type === 'error') toast.classList.add('bg-red-500');
        else if (type === 'warning') toast.classList.add('bg-orange-500');
        else toast.classList.add('bg-blue-500');
        
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            toast.classList.remove('bg-green-500', 'bg-red-500', 'bg-orange-500', 'bg-blue-500');
        }, 3000);
    }

    // Modalni yopish (tashqariga bosilganda)
    window.onclick = function(event) {
        const teacherModal = document.getElementById('teacherModal');
        const contactModal = document.getElementById('contactModal');
        
        if (event.target === teacherModal) {
            closeModal();
        }
        if (event.target === contactModal) {
            closeContactModal();
        }
    }
</script>

</body>
</html>
